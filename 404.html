<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirigiendo…</title>
  <script>
    (function(){
      var p = (window.location.pathname || '').replace(/\/+$/,'');
      var routes = {
        '/preparacion':'/preparacion/',
        '/consentimiento':'/consentimiento/',
        '/controldecirugias':'/controldecirugias/'
      };
      if(routes[p]){
        window.location.replace(routes[p]);
      }
    })();
  </script>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f8fafc;color:#0f172a;margin:0;padding:24px}
    .box{max-width:720px;margin:40px auto;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px}
    a{color:#1d4ed8}
  </style>
</head>
<body>
  <div class="box">
    <h2>Ruta no encontrada</h2>
    <p>Si no fuiste redirigido automáticamente, probá:</p>
    <ul>
      <li><a href="/controldecirugias/">/controldecirugias/</a></li>
      <li><a href="/preparacion/">/preparacion/</a></li>
      <li><a href="/consentimiento/">/consentimiento/</a></li>
    </ul>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Cirugías</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
/* Header */
body{font-family:'DM Sans',sans-serif;background:#F4F6F9;color:#1a2332;min-height:100vh;font-size:14px;line-height:1.5;overflow-y:auto;--header-h:120px;--filter-h:56px}
.app-shell{max-width:1320px;margin:0 auto;padding:0 14px 18px}
.topbar{position:static;background:#fff;border-bottom:1px solid #e2e8f0;box-shadow:0 6px 18px #0f172a10}
header{background:#fff;border:none;padding:12px 0 10px;display:flex;flex-direction:column;gap:10px;height:auto;position:sticky;top:0;z-index:230;box-shadow:0 2px 10px #0f172a14}
.brandbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 6px}
.logo{font-size:21px;font-weight:700;color:#1B4F8A;white-space:nowrap;letter-spacing:.1px;display:flex;align-items:baseline;gap:8px}
.logo small{font-weight:500;color:#64748b;font-size:12px}
.status-pill{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid #d6e3f5;border-radius:999px;padding:6px 11px;font-size:11px;font-weight:600;color:#334155}
.status-dot{width:8px;height:8px;border-radius:50%;background:#2E7D5E;box-shadow:0 0 0 3px #2E7D5E33}
#syncBadge{font-size:11px;color:#1a56db;display:inline-flex!important;align-items:center;gap:4px}
.connector-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 7px;border-radius:999px;border:1px solid #dbeafe;background:#eff6ff;color:#1d4ed8;font-weight:700}
.connector-badge.ok{background:#ecfdf5;border-color:#a7f3d0;color:#047857}
.connector-badge.off{background:#f8fafc;border-color:#e5e7eb;color:#64748b}
.connector-badge.run{background:#fff7ed;border-color:#fed7aa;color:#c2410c}
.connector-badge.err{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
.hspacer{flex:1}

/* Action bar */
.actionbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fff;border:1px solid #dce6f6;border-radius:12px;padding:8px 10px;box-shadow:0 2px 8px #0f172a0d}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 13px;border-radius:6px;border:1px solid #d1d9e6;background:#fff;color:#334155;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .1s,background .15s,border-color .15s,color .15s;white-space:nowrap;min-height:36px}
.btn:hover{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}
.btn.primary{background:#1B4F8A;border-color:#1B4F8A;color:#fff;box-shadow:0 4px 10px #1b4f8a2a}
.btn.primary:hover{background:#1e40af;border-color:#1e40af;color:#fff}
.btn.green{background:#2E7D5E;border-color:#2E7D5E;color:#fff}
.btn.green:hover{background:#047857;color:#fff}
.btn.orange{background:#d97706;border-color:#d97706;color:#fff}
.btn.orange:hover{background:#b45309;color:#fff}
.btn.red{background:#dc2626;border-color:#dc2626;color:#fff}
.btn.red:hover{background:#b91c1c;color:#fff}
.more-menu{position:relative}
.more-menu summary{list-style:none}
.more-menu summary::-webkit-details-marker{display:none}
.more-menu[open] summary{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8}
.more-menu-list{position:absolute;right:0;top:42px;z-index:240;min-width:220px;display:flex;flex-direction:column;gap:6px;background:#fff;border:1px solid #d7e0ee;border-radius:10px;padding:8px;box-shadow:0 14px 28px #0f172a22}
.more-menu-list .btn{width:100%;justify-content:flex-start}

/* Stats */
.statsbar{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px;display:grid;grid-template-columns:repeat(10,minmax(0,1fr));gap:10px;margin:10px 0 0}
.statsbar.hidden{display:none}
.stat{display:flex;flex-direction:column;align-items:flex-start;padding:10px 12px;border-radius:10px;border:1px solid #e8ecf2;gap:4px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.07)}

/* Tabs */
.tabrow{margin-top:10px;background:#fff;border:1px solid #dde5f0;border-radius:12px;padding:8px;display:flex;gap:8px;flex-wrap:wrap}
.tablink{padding:8px 14px;font-size:12px;font-weight:600;color:#64748b;border:1px solid transparent;border-radius:999px;cursor:pointer;transition:all .16s;background:#f8fafc;font-family:inherit}
.tablink:hover{color:#1a2332;background:#eef2ff}
.tablink.active{color:#1d4ed8;background:#e8f0ff;border-color:#bfd3ff}

/* Filters */
.filterbar{padding:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#f8fbff;border:1px solid #dfe8f5;border-radius:12px;margin-top:10px;position:sticky;top:var(--header-h);z-index:220;border-bottom:1px solid #d7e3f4;box-shadow:0 8px 18px #0f172a12}
.filterbar input[type='text'],.filterbar select{padding:7px 10px;border:1.5px solid #d1d5db;border-radius:8px;font-family:inherit;font-size:12px;color:#374151;background:#fff;outline:none;min-height:34px}
.filterbar input[type='text']:focus,.filterbar select:focus{border-color:#93c5fd;box-shadow:0 0 0 3px #93c5fd33}
.filterbar input[type='text']{width:230px}
.filterbar input[type='checkbox']{width:16px;height:16px;min-height:16px;accent-color:#1a56db}
.filterbar .filter-label{font-size:11px;color:#64748b;font-weight:600;display:flex;align-items:center;gap:4px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:6px 8px}
.quick-filters{display:flex;gap:6px;flex-wrap:wrap}
.qf-btn{padding:6px 10px;border:1px solid #d1d5db;border-radius:999px;background:#fff;font-size:11px;cursor:pointer;font-weight:600}
.qf-btn.active{background:#1a56db;color:#fff;border-color:#1a56db}
.alerts-toggle{padding:5px 10px;border-radius:6px;border:1.5px solid #fca5a5;background:#fef2f2;color:#dc2626;font-size:11px;font-weight:600;cursor:pointer;display:none}
.alerts-toggle.has-alerts{display:inline-flex;align-items:center;gap:4px}

/* Utilities */
:focus-visible{outline:2px solid #1B4F8A;outline-offset:2px}

.header-sep{width:1px;height:24px;background:#e2e8f0}
.content-card{margin-top:10px}
/* ALERTS PANEL */
.alerts-panel{margin:10px 0;background:#fff;border:1.5px solid #fca5a5;border-radius:10px;overflow:hidden;display:none}
.alerts-panel.open{display:block}
.alerts-head{background:#fef2f2;padding:8px 14px;font-size:11px;font-weight:600;color:#dc2626;display:flex;justify-content:space-between;align-items:center}
.alert-row{display:flex;align-items:center;gap:10px;padding:7px 14px;border-top:1px solid #fee2e2;cursor:pointer}
.alert-row:hover{background:#fef9f9}
.alert-row .ar-name{font-weight:600;min-width:180px;font-size:12px}
.alert-row .ar-msg{color:#dc2626;font-size:11px;flex:1}
.alert-row .ar-cl{font-size:10px;padding:2px 6px;border-radius:4px}

/* MAIN TABLE AREA */
.tablewrap{margin:10px 0 20px;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px #0001}
.table-scroll{overflow-x:auto;overflow-y:visible;max-height:none}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
thead{position:static}
thead th{position:static;background:#1B4F8A;padding:0;border-bottom:1px solid #E8ECF2;border-right:1px solid #2c5f9a;white-space:nowrap;font-weight:600;color:#fff;font-size:11px;user-select:none;box-sizing:border-box}
thead th .th-inner{display:flex;align-items:center;padding:8px 10px;gap:4px;cursor:pointer}
thead th .th-inner:hover{background:#e2e8f0}
thead th.th-check{width:36px;cursor:default}
thead th.th-check .th-inner{justify-content:center;cursor:default}
#mainTable td.th-check,#mainTable th.th-check{width:36px;min-width:36px;max-width:36px}

tbody tr{border-bottom:1px solid #E8ECF2;transition:background .15s ease;cursor:pointer}
tbody tr:hover{background:#EEF3FB}
tbody tr.selected{background:#eff6ff!important;outline:2px solid #3b82f6;outline-offset:-2px}
tbody tr.dup-error{background:#fef2f2!important}
tbody tr.dup-error td{border-color:#fecaca}
tbody tr:nth-child(even):not(.dup-error){background:#FAFBFD}
tbody td{padding:0;border-right:1px solid #E8ECF2;white-space:nowrap;vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
tbody td .cell{padding:7px 10px;min-height:34px;display:flex;align-items:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* INLINE EDITING */
td.editable .cell{cursor:text}
td.editable .cell:hover{background:#f0f9ff}
td.editing .cell{padding:0}
td.editing input,td.editing select{width:100%;height:34px;padding:0 8px;border:none;border-bottom:2px solid #3b82f6;background:#eff6ff;font-family:inherit;font-size:12px;color:#1a2332;outline:none}

/* BADGES */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b0{background:#fee2e2;color:#991b1b}   /* FALTA DIOPTRÍA */
.b1{background:#ffedd5;color:#9a3412}   /* FALTA PRE */
.b2{background:#fef9c3;color:#854d0e}   /* LISTO */
.b3{background:#dbeafe;color:#1e40af}   /* SOLICITADA */
.b4{background:#ede9fe;color:#5b21b6}   /* LLEGÓ */
.b5{background:#d1fae5;color:#065f46}   /* PROGRAMADA */
.b6{background:#dcfce7;color:#14532d}   /* REALIZADA */
.b7{background:#bbf7d0;color:#14532d}   /* FACTURADA */
.b8{background:#fce7f3;color:#9d174d}   /* DEVOLVER */
.b9{background:#fef3c7;color:#78350f}   /* FALTA OTRO OJO */
.bcl1{background:#dbeafe;color:#1e40af;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
.bcl2{background:#ede9fe;color:#5b21b6;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}

/* ROW NUMBER */
.rn{color:#9ca3af;font-size:10px;min-width:28px;text-align:right;padding-right:4px!important}

/* CHECKBOX */
.cbx{width:15px;height:15px;cursor:pointer;accent-color:#1a56db}

/* SIDE PANEL */
.side{position:fixed;right:0;top:0;bottom:0;width:400px;background:#fff;border-left:2px solid #e2e8f0;box-shadow:-4px 0 20px #0002;z-index:300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.side.open{transform:translateX(0)}
.side-head{padding:16px 18px;border-bottom:1px solid #e2e8f0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;background:#f8fafc}
.side-name{font-size:15px;font-weight:700;line-height:1.3}
.side-sub{font-size:11px;color:#6b7280;margin-top:2px}
.side-close{background:none;border:none;font-size:20px;color:#9ca3af;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.side-close:hover{color:#374151}
.side-body{flex:1;overflow-y:auto;padding:14px 18px}
.side-foot{padding:12px 18px;border-top:1px solid #e2e8f0;display:flex;gap:8px;flex-wrap:wrap;background:#f8fafc}
.sgroup{margin-bottom:14px}
.sgroup-title{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#6b7280;font-weight:600;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #f1f5f9}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.srow label{font-size:11px;color:#6b7280;min-width:130px;flex-shrink:0}
.srow input,.srow select{flex:1;padding:6px 8px;border:1.5px solid #d1d5db;border-radius:6px;font-family:inherit;font-size:12px;color:#1a2332;outline:none;background:#fff}
.srow input:focus,.srow select:focus{border-color:#93c5fd;background:#f0f9ff}
.estado-calc{padding:6px 10px;border-radius:7px;font-size:12px;font-weight:600;text-align:center;margin-bottom:14px}
.alertas-box{margin-bottom:12px}
.alerta-item{background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;padding:6px 10px;font-size:11px;color:#dc2626;margin-bottom:4px}

/* KANBAN */
.kanban{display:flex;gap:12px;padding:10px 0 20px;overflow-x:auto}
.kancol{flex:0 0 200px;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px}
.kancol-h{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#6b7280;font-weight:600;display:flex;justify-content:space-between;margin-bottom:8px}
.kancol-n{background:#f1f5f9;padding:1px 6px;border-radius:8px;font-size:11px}
.kancard{background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.kancard:hover{border-color:#93c5fd;transform:translateY(-1px);box-shadow:0 2px 6px #0001}
.kancard-name{font-weight:600;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.kancard-meta{font-size:10px;color:#6b7280;display:flex;gap:5px;flex-wrap:wrap}
.kancard-alert{font-size:10px;color:#dc2626;margin-top:3px}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a2332;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:1000;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* EMPTY */
.empty{text-align:center;color:#9ca3af;padding:50px;font-style:italic}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}


/* WHATSAPP TAB */
.wa-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px}
.wa-tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.wa-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.wa-table th,.wa-table td{border:1px solid #e5e7eb;padding:6px;text-align:center;vertical-align:middle}
.wa-table th{background:#f0f6ff}
.wa-table input[type='text'],.wa-table input[type='time']{width:100%;padding:5px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px}
.wa-table button:disabled{opacity:.45;cursor:not-allowed}
.wa-wrap.whatsapp-confirmar{border:1px solid #d9e4f5;border-radius:16px;padding:18px;background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);box-shadow:0 12px 30px #0f172a12}
.wa-topline{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.wa-title{margin:0;font-size:20px;color:#0f4ab8}
.wa-grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:10px;align-items:end}
.wa-card{background:#fff;border:1px solid #dbe5f4;border-radius:12px;padding:12px}
.wa-card h4{margin:0 0 8px;font-size:12px;color:#334155;text-transform:uppercase;letter-spacing:.03em}
.wa-grid .span-2{grid-column:span 2}.wa-grid .span-3{grid-column:span 3}.wa-grid .span-4{grid-column:span 4}.wa-grid .span-6{grid-column:span 6}.wa-grid .span-12{grid-column:span 12}
.wa-actions-main .btn{min-height:36px}
.wa-actions-main .btn.primary{background:#1a56db;border-color:#1a56db;color:#fff}
.wa-actions-secondary{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.wa-actions-secondary .btn{background:#fff}
.wa-meta{margin:10px 0 8px;color:#475569;font-size:12px}
.wa-table-wrap{margin-top:8px;border:1px solid #dbe5f4;border-radius:12px;overflow:auto;background:#fff}
@media(max-width:1100px){.wa-grid{grid-template-columns:repeat(6,minmax(0,1fr))}.wa-grid .span-4,.wa-grid .span-6{grid-column:span 6}.wa-grid .span-3{grid-column:span 3}.wa-grid .span-2{grid-column:span 3}}
@media(max-width:720px){.wa-wrap.whatsapp-confirmar{padding:12px}.wa-grid{grid-template-columns:1fr}.wa-grid .span-2,.wa-grid .span-3,.wa-grid .span-4,.wa-grid .span-6,.wa-grid .span-12{grid-column:span 1}.wa-actions-secondary{justify-content:flex-start}}
.wa-estado.ok{color:#059669;font-weight:600}
.wa-estado.err{color:#dc2626;font-weight:600}
.wa-estado.pend{color:#6b7280;font-weight:600}


/* WhatsApp Focus Mode */
.mode-whatsapp .statsbar,
.mode-whatsapp .filterbar,
.mode-whatsapp .alerts-panel,
.mode-whatsapp #tabView,
.mode-whatsapp #kanView,
.mode-whatsapp #calView,
.mode-whatsapp #statsView{display:none!important}
.mode-whatsapp .tabrow{padding:6px 8px;gap:6px;position:sticky;top:0;z-index:220;background:#fff}
.mode-whatsapp .tabrow .tablink:not(.active){display:none}
.mode-whatsapp .app-shell.content-card{max-width:1180px;padding-top:8px}
.mode-whatsapp #waView{margin:0!important;display:block!important}
.mode-whatsapp .whatsapp-confirmar{border:1px solid #d9e4f5;border-radius:16px;padding:18px;background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);box-shadow:0 12px 30px #0f172a12}
.mode-whatsapp .whatsapp-confirmar h3{font-size:20px;color:#0f4ab8;margin-bottom:14px!important}
.mode-whatsapp .whatsapp-confirmar .wa-tools{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:10px;align-items:end}
.mode-whatsapp .whatsapp-confirmar .wa-tools > *{grid-column:span 3}
.mode-whatsapp .whatsapp-confirmar #waStartTurnos,
.mode-whatsapp .whatsapp-confirmar #waStartDocs{grid-column:span 3;background:#1a56db;border-color:#1a56db;color:#fff}
.mode-whatsapp .whatsapp-confirmar #waStop,
.mode-whatsapp .whatsapp-confirmar #waReset{grid-column:span 2}
.mode-whatsapp .whatsapp-confirmar #waContador{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:8px 10px}
@media(max-width:960px){
  .mode-whatsapp .tabrow .tablink:not(.active){display:inline-flex}
  .mode-whatsapp .whatsapp-confirmar .wa-tools{grid-template-columns:repeat(6,minmax(0,1fr))}
  .mode-whatsapp .whatsapp-confirmar .wa-tools > *{grid-column:span 3}
}
@media(max-width:640px){
  .mode-whatsapp .app-shell.content-card{padding:6px 8px 14px}
  .mode-whatsapp .whatsapp-confirmar{padding:12px}
  .mode-whatsapp .whatsapp-confirmar .wa-tools{grid-template-columns:1fr}
  .mode-whatsapp .whatsapp-confirmar .wa-tools > *{grid-column:span 1}
}


@media(max-width:768px){
  #mainTable thead{display:none}
  #mainTable,#mainTable tbody,#mainTable tr,#mainTable td{display:block;width:100%}
  #mainTable tr{background:#fff;border:1px solid #e8ecf2;border-radius:10px;margin:0 0 10px;overflow:hidden}
  #mainTable td{border-right:none;border-bottom:1px solid #eef2f7;white-space:normal}
  #mainTable td:last-child{border-bottom:none}
  #mainTable td .cell{display:flex;justify-content:space-between;gap:10px;white-space:normal}
  #mainTable td[data-label] .cell::before{content:attr(data-label);font-weight:600;color:#1B4F8A;min-width:120px}
  #mainTable td.th-check .cell::before{content:'Selección'}
}
@media(max-width:1280px){.statsbar{grid-template-columns:repeat(4,minmax(0,1fr));}}
@media(max-width:768px){.statsbar{grid-template-columns:repeat(2,minmax(0,1fr));}}
@media(min-width:1281px){.statsbar{grid-template-columns:repeat(10,minmax(0,1fr));}}

@media(max-width:960px){.actionbar{padding:8px}.header-sep{display:none}.filterbar{gap:7px;top:var(--header-h)}.filterbar input[type='text']{width:100%}.more-menu-list{left:0;right:auto}}
@media(max-width:640px){.side{width:100%}.tabrow{gap:6px}.tablink{padding:7px 11px}.tablewrap{margin:8px 0}}
</style>
</head>
<body>

<div class="topbar">
  <div class="app-shell">
    <!-- HEADER -->
    <header>
      <div class="brandbar">
        <div class="logo">Centro de Ojos Esteves <small>Gestión de Cirugías</small></div>
        <div class="status-pill"><span class="status-dot"></span> <span>Listo</span> <span id="syncBadge"></span> <span id="connectorBadge" class="connector-badge off">Conector: no detectado</span></div>
      </div>
      <div class="actionbar">
        <button class="btn primary" aria-label="Nuevo paciente" onclick="nuevoModal()">+ Nuevo Paciente</button>
        <button class="btn" aria-label="Sincronizar datos" onclick="sincronizarAhora()" title="Recargar datos del servidor">↺ Sync</button>
        <button class="btn" aria-label="Generar Lentess con filas filtradas" onclick="abrirLentessModal()">🧿 Lentess filtrados</button>
        <button class="btn" id="toggleKpisBtn" aria-label="Ocultar KPIs" onclick="toggleKpis()">Ocultar KPIs</button>
        <span class="header-sep"></span>
        <details class="more-menu">

const CONNECTOR_BASE='http://127.0.0.1:8765';
let CONNECTOR_STATUS='off';
let CONNECTOR_HEALTH_TIMER=null;
function setConnectorBadge(state,msg){
  CONNECTOR_STATUS=state;
  const el=document.getElementById('connectorBadge');
  if(!el) return;
  el.className=`connector-badge ${state}`;
  el.textContent=msg;
}
async function connectorFetch(path,opts={}){
  const ctrl=new AbortController();
  const tm=setTimeout(()=>ctrl.abort(),opts.timeoutMs||12000);
  try{
    const res=await fetch(`${CONNECTOR_BASE}${path}`,Object.assign({},opts,{signal:ctrl.signal,headers:Object.assign({'Content-Type':'application/json'},opts.headers||{})}));
    const txt=await res.text();
    let data={};
    try{data=txt?JSON.parse(txt):{};}catch(_){data={raw:txt||''};}
    if(!res.ok) throw new Error(data?.detail||data?.error||`HTTP ${res.status}`);
    return data;
  }finally{ clearTimeout(tm); }
}
async function connectorHealthCheck(){
  try{
    await connectorFetch('/health',{method:'GET',headers:{},timeoutMs:3500});
    if(CONNECTOR_STATUS!=='run') setConnectorBadge('ok','Conector: activo');
    return true;
  }catch(e){
    if(CONNECTOR_STATUS!=='run') setConnectorBadge('off','Conector: no detectado');
    return false;
  }
}
async function connectorStartJob(kind,payload){
  const healthy=await connectorHealthCheck();
  if(!healthy) throw new Error('Conector local no detectado. Abrí el conector Windows e intentá nuevamente.');
  setConnectorBadge('run','Conector: ejecutando automatización');
  const data=await connectorFetch(`/jobs/${kind}`,{method:'POST',body:JSON.stringify(payload),timeoutMs:12000});
  const jobId=data.job_id||data.id;
  if(!jobId) throw new Error('El conector respondió sin job_id.');
  return jobId;
}
async function connectorPollJob(jobId,onUpdate){
  const started=Date.now();
  const maxMs=15*60*1000;
  while(Date.now()-started<maxMs){
    const data=await connectorFetch(`/jobs/${encodeURIComponent(jobId)}`,{method:'GET',headers:{},timeoutMs:10000});
    const st=String(data.status||'').toLowerCase();
    if(onUpdate) onUpdate(data);
    if(['completed','ok','done','success'].includes(st)){
      setConnectorBadge('ok','Conector: activo');
      return data;
    }
    if(['error','failed','cancelled'].includes(st)){
      setConnectorBadge('err','Conector: error de ejecución');
      throw new Error(data.error||data.detail||'La automatización finalizó con error.');
    }
    await new Promise(r=>setTimeout(r,1700));
  }
  setConnectorBadge('err','Conector: tiempo de espera agotado');
  throw new Error('Tiempo de espera agotado al consultar el conector.');
}

}

function toDateOnly(d){const dt=parseDateOnly(d); return dt?new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()):null;}
function diffDays(a,b){const da=toDateOnly(a), db=toDateOnly(b); if(!da||!db) return null; return Math.floor((da-db)/86400000);}
function detectDelimiter(line){const c=(line.match(/,/g)||[]).length; const sc=(line.match(/;/g)||[]).length; const t=(line.match(/\t/g)||[]).length; return t>=sc&&t>=c?'\t':(sc>c?';':',');}
function parseDelimitedRows(text){
  const lines=String(text||'').split(/\r?\n/).filter(Boolean);
  if(!lines.length) return [];
  const d=detectDelimiter(lines[0]);
  const headers=lines[0].split(d).map(h=>h.trim());
  return lines.slice(1).map(line=>{const cols=line.split(d); const out={}; headers.forEach((h,i)=>out[h]=String(cols[i]||'').trim()); return out;});
}
function severityByDays(days){if(days>=SETTINGS.CRIT_DAYS) return 'red'; if(days>=Math.max(30,SETTINGS.WARN_DAYS+15)) return 'orange'; if(days>=SETTINGS.WARN_DAYS) return 'yellow'; return 'neutral';}
function saveSettings(){localStorage.setItem('cirugias_settings', JSON.stringify(SETTINGS)); localStorage.setItem('cirugias_alert_silences', JSON.stringify(ALERT_SILENCES));}
function configureIDB(){return new Promise(res=>{if(!window.indexedDB)return res(null); const req=indexedDB.open('cirugias_db',1); req.onupgradeneeded=()=>{req.result.createObjectStore('kv')}; req.onsuccess=()=>res(req.result); req.onerror=()=>res(null);});}
async function idbSet(key,val){const db=await configureIDB(); if(!db) return; await new Promise(r=>{const tx=db.transaction('kv','readwrite'); tx.objectStore('kv').put(val,key); tx.oncomplete=()=>r(); tx.onerror=()=>r();});}
async function idbGet(key){const db=await configureIDB(); if(!db) return null; return await new Promise(r=>{const tx=db.transaction('kv','readonly'); const q=tx.objectStore('kv').get(key); q.onsuccess=()=>r(q.result||null); q.onerror=()=>r(null);});}


async function apiCall(action, data={}) {
  if (!APPS_SCRIPT_URL) return null;
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=' + action, {
      method: 'POST',
      body: JSON.stringify({ action, ...data })
    });
    return await res.json();
  } catch(e) {
    console.error('API error:', e);
    return null;
  }
}

async function loadFromServer() {
  if (!APPS_SCRIPT_URL) {
    // Sin URL configurada → usar datos locales/seed
    const cached = localStorage.getItem('cirugias_cache') || await idbGet('cirugias_cache');
    if (cached) { DB = typeof cached==='string'?JSON.parse(cached):cached; }
    else { DB = { rows: seed(), nid: 200 }; }
    return;
  }
  showSyncBadge('⟳ Cargando...');
  const result = await apiCall('getAll');
  if (result && result.rows) {
    // Convertir ids a número
    result.rows.forEach(r => { r.id = parseInt(r.id)||0; });
    const ids = result.rows.map(r=>r.id).filter(Boolean);
    const maxId = ids.length ? Math.max(...ids) : 0;
    DB = { rows: result.rows, nid: maxId + 1 };
    localStorage.setItem('cirugias_cache', JSON.stringify(DB));
    idbSet('cirugias_cache', DB);
    showSyncBadge('✓ En línea', 'green');
  } else {
    showSyncBadge('⚠ Sin conexión — datos locales', 'orange');
    const cached = localStorage.getItem('cirugias_cache') || await idbGet('cirugias_cache');
    if (cached) DB = typeof cached==='string'?JSON.parse(cached):cached;
  }
}

async function save(changedRow) {

  localStorage.setItem('cirugias_cache', JSON.stringify(DB));

  if (!APPS_SCRIPT_URL || !changedRow) return;
  showSyncBadge('⟳ Guardando...');
  const result = await apiCall('save', { row: changedRow });
  if (result && result.ok) showSyncBadge('✓ Guardado', 'green');
  else showSyncBadge('⚠ Error al guardar', 'red');
}

async function deleteFromServer(id) {

}

function showSyncBadge(msg, color='blue') {
  const b = document.getElementById('syncBadge');
  if (!b) return;
  const colors = { green:'#059669', orange:'#d97706', red:'#dc2626', blue:'#1a56db' };

// BUSINESS LOGIC
// ─────────────────────────────────────────────
function hoyISO(){return new Date().toISOString().slice(0,10)}
function parseDateOnly(d){
  if(!d) return null;
  if(d instanceof Date && !isNaN(d)){ const t=new Date(d); t.setHours(0,0,0,0); return t; }
  const v=String(d).trim();
  let dt=null;
  const m=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){
    const day=parseInt(m[1],10), month=parseInt(m[2],10)-1, year=parseInt(m[3],10);
    dt=new Date(year,month,day);
    if(dt.getFullYear()!==year||dt.getMonth()!==month||dt.getDate()!==day) return null;
  }else if(/^\d{4}-\d{2}-\d{2}/.test(v)){
    const [y,mo,da]=v.slice(0,10).split('-').map(n=>parseInt(n,10));
    dt=new Date(y,mo-1,da);
    if(dt.getFullYear()!==y||dt.getMonth()!==mo-1||dt.getDate()!==da) return null;
  }else{
    const temp=new Date(v);
    if(!isNaN(temp)) dt=temp;
  }
  if(!dt||isNaN(dt)) return null;
  dt.setHours(0,0,0,0);
  return dt;
}
function daysSince(d){ const dt=parseDateOnly(d); if(!dt) return -1; const h=parseDateOnly(hoyISO()); return Math.floor((h-dt)/86400000); }
function clinicaClass(c){ return c==='CDU'?'bcl1':'bcl2'; }
function normalizarClinica(c){ if(c==='Clínica 1'||c==='CDU') return 'CDU'; if(c==='Clínica 2'||c==='Gualeguaychu'||c==='Gualeguaychú') return 'Gualeguaychú'; return c||'CDU'; }
function getDioptria(p){ return p.dioptria||p.lio||''; }
function normalizeEstadoCir(p){
  const fc=toDateOnly(p.fechaCir);
  const hoy=toDateOnly(hoyISO());
  if(!fc){
    if((p.estadoCir||'').toUpperCase()==='PROGRAMADA') p.estadoCir='';
    return;
  }
  p.estadoCir = hoy <= fc ? 'Programada' : 'Realizada';
}
function secondEyeMissing(p){
  if(p.ojos!=='2 ojos') return '';
  const otro = p.ojo==='OD'?'OI':'OD';
  const dni=String(p.dni||'').trim();
  const hasOther=DB.rows.some(x=>x.id!==p.id&&String(x.dni||'').trim()===dni&&x.ojo===otro);
  return hasOther?'':otro;
}
function duplicateNewestIds(){
  const map={};
  DB.rows.forEach(r=>{const k=`${String(r.dni||'').trim()}|${r.ojo||''}`; if(!map[k]) map[k]=[]; map[k].push(r);});
  const dup=new Set();
  Object.values(map).forEach(arr=>{ if(arr.length>1 && arr[0].dni){ arr.sort((a,b)=> (b.id||0)-(a.id||0)); dup.add(arr[0].id); }});
  return dup;
}
function estado(p){
  normalizeEstadoCir(p);
  if(p.recepLente==='Devolver') return 'DEVOLVER LENTE';
  const fac=(p.estadoFac||'').toUpperCase();
  const missEye=secondEyeMissing(p);
  if(fac==='REALIZADA'||fac==='FACTURADA'){
    if(missEye) return `FACTURADA | FALTA ${missEye}`;
    return 'FINALIZADO - FACTURADA';
  }
  if((p.estadoCir||'').toUpperCase()==='REALIZADA') return 'CIRUGÍA REALIZADA - FALTA FACTURAR';
  if(p.fechaCir) return 'FECHA PROGRAMADA';
  if(p.fechaLlegaLente) return 'LENTE LLEGÓ';
  if(p.fechaSolLente) return 'LENTE SOLICITADA';
  if(!getDioptria(p)) return 'FALTA DIOPTRÍA';
  if(!p.pre||p.pre!=='OK') return 'FALTA PREQUIRÚRGICO';
  return 'LISTO PARA PEDIR LENTE';
}
function estadoLabelNorm(v){
  return String(v||'').trim().replace(/\s+/g,' ').toUpperCase();
}
function estadoLabelCanon(v){
  const n=estadoLabelNorm(v);
  if(n==='FINALIZADO-FACTURADA') return 'FINALIZADO - FACTURADA';
  if(n==='FACTURADA|FALTA OD' || n==='FACTURADA | FALTA OD') return 'FACTURADA | FALTA OD';
  if(n==='FACTURADA|FALTA OI' || n==='FACTURADA | FALTA OI') return 'FACTURADA | FALTA OI';
  return String(v||'').trim().replace(/\s+/g,' ');
}
function refreshEstadoFilterOptions(){
  const sel=document.getElementById('fEst');
  if(!sel) return;
  const current=sel.value||'';
  const map=new Map();
  DB.rows.forEach(r=>{
    const st=estadoLabelCanon(estado(r));
    const key=estadoLabelNorm(st);
    if(key&&!map.has(key)) map.set(key,st);
  });
  const ordered=Array.from(map.values()).sort((a,b)=>a.localeCompare(b,'es'));
  sel.innerHTML='<option value="">Todos los estados</option>'+ordered.map(st=>`<option value="${st}">${st}</option>`).join('');
  if(current && ordered.some(st=>estadoLabelNorm(st)===estadoLabelNorm(current))){
    const found=ordered.find(st=>estadoLabelNorm(st)===estadoLabelNorm(current));
    sel.value=found;
  }
}

function episodeIdFor(p){
  if(p.episode_id) return p.episode_id;
  const base=(p.fechaCir||p.fechaCarga||hoyISO()).slice(0,7);
  return `${String(p.dni||'').trim()}|${p.clinica||''}|${base}`;
}
function mkAlert(type,p,days,baseDate,eye='NA',msgPrefix=''){
  const d=Math.max(0, days||0);
  const key=`${type}|${String(p.dni||'').trim()}|${p.clinica||''}|${episodeIdFor(p)}|${eye||'NA'}|${baseDate||''}`;
  return {type,days:d,key,severity:severityByDays(d),msg:`${msgPrefix}${d} DÍAS`};
}
function isSilenced(a){ return !!ALERT_SILENCES[a.key]; }
function silenciarAlerta(key){ ALERT_SILENCES[key]={silencedAt:new Date().toISOString()}; saveSettings(); render(); }
function reactivarAlerta(key){ delete ALERT_SILENCES[key]; saveSettings(); render(); }
function alertas(p,opts={}){
  const today=toDateOnly(hoyISO());
  const res=[];
  const showSilenced=!!(document.getElementById('showSilenced')?.checked);
  const st=estado(p);
  const dni=String(p.dni||'').trim();
  const ojo=String(p.ojo||'').toUpperCase()||'NA';
  const sevBySteps=(d,yellowFrom,redFrom)=> d>redFrom?'red':(d>yellowFrom?'yellow':'neutral');

  if(p.recepLente==='Devolver' || st==='DEVOLVER LENTE'){
    const a={type:'devolver',days:SETTINGS.CRIT_DAYS,key:`devolver|${p.id}|${p.recepLente||'DEVOLVER'}`,severity:'red',msg:'⚠ DEVOLVER LENTE'};
    if(opts.raw) return [a];
    return (showSilenced || !isSilenced(a)) ? [a] : [];
  }

  if((!p.fechaCir || p.fechaCir==='FECHA NO ASIGNADA')){
    const base=p.createdAt||p.updatedAt||p.fechaCarga||hoyISO();
    const d=diffDays(today, base);
    if(d!==null && d>=SETTINGS.WARN_DAYS) res.push(mkAlert('not_scheduled',p,d,base,p.ojo,'FECHA NO PROGRAMADA '));
  }

  // NUEVA: cargado sin pedir lente por más de N días
  if(!p.fechaSolLente && !p.fechaLlegaLente && !p.fechaCir && String(p.estadoCir||'').toUpperCase()!=='REALIZADA'){
    const base=p.fechaCarga||p.createdAt||hoyISO();
    const d=diffDays(today, base);
    if(d!==null && d>=SETTINGS.lens_not_requested_days){
      res.push({type:'lens_not_requested',days:d,key:`lens_not_requested:${dni}:${ojo}`,severity:severityByDays(d),msg:`SIN PEDIDO DE LENTE (+${d} días)`});
    }
  }

  // B) LENTE SOLICITADA PERO NO LLEGÓ
  // >10 días amarillo / >15 días rojo
  if(p.fechaSolLente && !p.fechaLlegaLente){
    const d=diffDays(today,p.fechaSolLente);
    if(d!==null && d>10){
      res.push({type:'lens_delayed',days:d,key:`lens_delayed:${dni}:${ojo}`,severity:sevBySteps(d,10,15),msg:`DEMORA EN LLEGADA DE LENTE (+${d} días)`});
    }
  }

  // C) DEMORA EN PROGRAMACIÓN DE CIRUGÍA
  // Se anula automáticamente cuando se carga Fecha.Cir
  // >15 días amarillo / >30 días rojo
  if(p.fechaLlegaLente && !p.fechaCir){
    const d=diffDays(today,p.fechaLlegaLente);
    if(d!==null && d>15){
      res.push({type:'no_schedule_after_arrival',days:d,key:`no_schedule_after_arrival:${dni}:${ojo}`,severity:sevBySteps(d,15,30),msg:`DEMORA EN PROGRAMACIÓN DE CIRUGÍA (+${d} días)`});
    }
  }

  if(p.fechaCir && st==='FECHA PROGRAMADA' && !p.fechaLlegaLente){
    const dts=diffDays(p.fechaCir,today);
    if(dts!==null && dts<=SETTINGS.scheduled_but_lens_not_arrived_days) res.push({type:'scheduled_no_lens',days:dts,key:`scheduled_no_lens|${p.id}|${p.fechaCir}`,severity:dts<=0?'red':'yellow',msg:`CIRUGÍA PRÓXIMA SIN LENTE (${dts} DÍAS)`});
  }

  const fac=(p.estadoFac||'').toUpperCase();
  const facturacionRealizada = fac==='REALIZADA' || fac==='FACTURADA';
  if((st==='CIRUGÍA REALIZADA - FALTA FACTURAR' || st==='FINALIZADO - FACTURADA') && !facturacionRealizada){
    const d=diffDays(today,p.fechaCir);
    if(d!==null && d>=Math.max(SETTINGS.WARN_DAYS, SETTINGS.billing_not_done_days)) res.push(mkAlert('billing_pending',p,d,p.fechaCir,p.ojo,'FACTURACIÓN NO REALIZADA '));
  }

  // A) PACIENTE NO REALIZÓ SEGUNDA CIRUGÍA (+X días) >30, por DNI (sin duplicar)
  if((p.ojos==='2 ojos' || p.requires_two_eyes) && dni){
    const rowsDni=DB.rows.filter(x=>String(x.dni||'').trim()===dni);
    const realizados=rowsDni.filter(x=>(String(x.estadoCir||'').toUpperCase()==='REALIZADA') && x.fechaCir).sort((a,b)=>String(a.fechaCir).localeCompare(String(b.fechaCir)));
    if(realizados.length){
      const first=realizados[0];
      const firstEye=String(first.ojo||'').toUpperCase();
      const opposite=firstEye==='OD'?'OI':firstEye==='OI'?'OD':'';
      const anchorId=first.id;
      if(p.id===anchorId && opposite){
        const progress=rowsDni.some(x=>String(x.ojo||'').toUpperCase()===opposite && (x.fechaSolLente || x.fechaCir || String(x.estadoCir||'').toUpperCase()==='REALIZADA'));
        const stillTwoEyes=rowsDni.some(x=>x.ojos==='2 ojos' || x.requires_two_eyes);
        if(stillTwoEyes && !progress){
          const d=diffDays(today,first.fechaCir);
          if(d!==null && d>30){
            res.push({type:'second_surgery_missing',days:d,key:`second_surgery_missing:${dni}`,severity:d>50?'red':'yellow',msg:`PACIENTE NO REALIZÓ SEGUNDA CIRUGÍA (+${d} días)`});
          }
        }
      }
    }
  }

  const unique=[]; const seen=new Set();
  res.forEach(a=>{if(!seen.has(a.key)){seen.add(a.key); unique.push(a);}});
  if(opts.raw) return unique;
  return unique.filter(a=>showSilenced || !isSilenced(a));
}

function fd(d){if(!d)return '—';const dt=new Date(d);if(isNaN(dt))return '—';return dt.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'})}

function filtered(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const fc=document.getElementById('fCli').value;
  const fe=document.getElementById('fEst').value;
  const fo=document.getElementById('fOS').value;
  let rows=[...DB.rows];
  if(q) rows=rows.filter(p=>(p.nombre||'').toLowerCase().includes(q)||String(p.dni||'').includes(q));
  if(fc) rows=rows.filter(p=>p.clinica===fc);
  if(fe) rows=rows.filter(p=>estado(p)===fe);
  if(fo) rows=rows.filter(p=>p.obraSocial===fo);
  if(quickFilter==='PROGRAMADAS') rows=rows.filter(p=>estado(p)==='FECHA PROGRAMADA');
  if(quickFilter==='LENTE PEDIDA') rows=rows.filter(p=>estado(p)==='LENTE SOLICITADA');
  if(quickFilter==='REALIZADAS') rows=rows.filter(p=>(p.estadoCir||'').toUpperCase()==='REALIZADA');
  if(quickFilter==='FACTURADAS') rows=rows.filter(p=>['REALIZADA','FACTURADA'].includes((p.estadoFac||'').toUpperCase()));
  rows.sort((a,b)=>{
    const va=a[sortCol]||'',vb=b[sortCol]||'';
    return va<vb?-sortDir:va>vb?sortDir:0;
  });
  return rows;
}

function renderStats(){
  const all=DB.rows;
  let nalerts=0,nPedidas=0,nprog=0,nreal=0,nCDU=0,nGchu=0,nFact=0,nPendFac=0,nCrit=0;
  all.forEach(p=>{
    const ars=alertas(p);
    nalerts+=ars.length;
    nCrit+=ars.filter(a=>a.severity==='red').length;
    const e=estado(p);
    if(e==='LENTE SOLICITADA') nPedidas++;
    if(e==='FECHA PROGRAMADA') nprog++;
    if(e==='CIRUGÍA REALIZADA - FALTA FACTURAR' || e==='FINALIZADO - FACTURADA') nreal++;
    if((p.estadoFac||'').toUpperCase()==='FACTURADA') nFact++;
    if((e==='CIRUGÍA REALIZADA - FALTA FACTURAR') && (p.estadoFac||'').toUpperCase()!=='FACTURADA') nPendFac++;
    if(p.clinica==='CDU') nCDU++;
    if(p.clinica==='Gualeguaychú' || p.clinica==='Gualeguaychú') nGchu++;
  });
  document.getElementById('statsbar').innerHTML=`
    <div class="stat s-blue"><div class="stat-n">👥 ${new Set(all.map(x=>String(x.dni||'').trim()).filter(Boolean)).size}</div><div class="stat-l">Total pacientes</div></div>

    <div class="stat s-yellow"><div class="stat-n">📅 ${nprog}</div><div class="stat-l">Programadas</div></div>
    <div class="stat s-green"><div class="stat-n">✅ ${nreal}</div><div class="stat-l">Realizadas</div></div>
    <div class="stat s-green"><div class="stat-n">💳 ${nFact}</div><div class="stat-l">Facturadas</div></div>
    <div class="stat s-red"><div class="stat-n">⏳ ${nPendFac}</div><div class="stat-l">Pend. facturar</div></div>
    <div class="stat s-red"><div class="stat-n">⚠️ ${nalerts}</div><div class="stat-l">Alertas activas</div></div>
    <div class="stat s-red"><div class="stat-n">🚨 ${nCrit}</div><div class="stat-l">Alertas críticas</div></div>
    <div class="stat"><div class="stat-n">🏥 ${nCDU}</div><div class="stat-l">CDU</div></div>
    <div class="stat"><div class="stat-n">🏥 ${nGchu}</div><div class="stat-l">Gualeguaychú</div></div>`;
  const btn=document.getElementById('alertsToggle');

      solLente:`<td class="editable" data-label="Sol.Lente." ondblclick="inlineEditDate(event,${p.id},'fechaSolLente')" title="Doble clic para editar"><div class="cell" title="${fd(p.fechaSolLente)}">${fd(p.fechaSolLente)}</div></td>`,
      llego:`<td class="editable" data-label="Llegó." ondblclick="inlineEditDate(event,${p.id},'fechaLlegaLente')" title="Doble clic para editar"><div class="cell" style="color:${p.fechaLlegaLente?'#059669':'inherit'}" title="${fd(p.fechaLlegaLente)}">${fd(p.fechaLlegaLente)}</div></td>`,
      fechaCir:`<td class="editable" data-label="Fecha.Cir" ondblclick="inlineEditDate(event,${p.id},'fechaCir')" title="Doble clic para editar"><div class="cell" title="${fd(p.fechaCir)}">${fd(p.fechaCir)}</div></td>`,
      estCir:`<td class="editable" data-label="Est.Cir" ondblclick="inlineEditSel(event,${p.id},'estadoCir',['','Realizada','Programada'])" title="Doble clic para editar"><div class="cell">${p.estadoCir?`<span class="badge b6">${p.estadoCir}</span>`:'—'}</div></td>`,
      facturacion:`<td class="editable" data-label="Facturación" ondblclick="inlineEditSel(event,${p.id},'estadoFac',['','Realizada','FACTURADA'])" title="Doble clic para editar"><div class="cell">${p.estadoFac?`<span class="badge b7">${p.estadoFac}</span>`:'—'}</div></td>`,
      estadoActual:`<td data-label="Estado actual"><div class="cell" title="${e}"><span class="badge ${bc(e)}">${e.length>28?e.substring(0,26)+'…':e}</span></div></td>`
    };
    const tds=MAIN_TABLE_COLUMNS.map(c=>rowCells[c.key]).join('');
    return `<tr class="${sel?'selected':''} ${dup?'dup-error':''}" onclick="rowClick(event,${p.id})">${tds}</tr>`;
  }).join('');
  devWarnTableMismatch();
}

// INLINE EDITING (doble click en celda)
// ─────────────────────────────────────────────
function inlineEdit(e,id,field){
  e.stopPropagation();
  const td=e.currentTarget;
  const p=DB.rows.find(x=>x.id===id);
  td.classList.add('editing');
  td.innerHTML=`<input type="text" value="${p[field]||''}" autofocus onblur="commitInline(event,${id},'${field}')" onkeydown="if(event.key==='Enter')event.target.blur();if(event.key==='Escape'){event.target.dataset.cancel='1';event.target.blur()}">`;
  td.querySelector('input').focus();
}

function inlineEditDate(e,id,field){
  e.stopPropagation();
  const td=e.currentTarget;
  const p=DB.rows.find(x=>x.id===id);
  td.classList.add('editing');
  td.innerHTML=`<input type="date" value="${fdInput(p[field])}" autofocus onblur="commitInline(event,${id},'${field}')" onkeydown="if(event.key==='Enter')event.target.blur();if(event.key==='Escape'){event.target.dataset.cancel='1';event.target.blur()}">`;
  td.querySelector('input').focus();
}

function inlineEditSel(e,id,field,opts){
  e.stopPropagation();
  const td=e.currentTarget;
  const p=DB.rows.find(x=>x.id===id);
  td.classList.add('editing');
  const optsHtml=opts.map(o=>`<option value="${o}" ${p[field]===o?'selected':''}>${o||'—'}</option>`).join('');
  td.innerHTML=`<select autofocus onblur="commitInline(event,${id},'${field}')" onchange="this.blur()">${optsHtml}</select>`;
  td.querySelector('select').focus();
}

function commitInline(e,id,field){
  const el=e.target;
  if(el.dataset.cancel){render();return}
  const val=el.value;
  const p=DB.rows.find(x=>x.id===id);
  p[field]=val;
  save();
  render();
  toast('✓ Guardado');
}

  const p=DB.rows.find(x=>x.id===id);

  validarFila(p);
  save(p);
  renderStats();

function duplicarPaciente(id){
  const orig=DB.rows.find(x=>x.id===id);
  if(!orig){return}
  const copia={...orig};
  copia.id=DB.nid++;
  copia.ojo=orig.ojo==='OD'?'OI':'OD';
  copia.ojos='2 ojos';
  // Reset flujo lente/cirugia
  copia.fechaSolLente='';
  copia.fechaLlegaLente='';
  copia.recepLente='';
  copia.fechaCir='';
  copia.estadoCir='';
  copia.estadoFac='';
  copia.notas=`Copia de ${orig.nombre} — ${orig.ojo} → ${copia.ojo}`;
  DB.rows.push(copia);
  save(copia);
  render();
  closeSide();
  setTimeout(()=>{openSide(copia.id)},100);
  toast(`✓ Duplicado para ojo ${copia.ojo}`);
}

let DASH_FILTERS={from:'',to:'',clinic:'AMBAS',onlyAlerts:false,onlyActive:false};
function getDashboardRows(){
  return DB.rows.filter(p=>{
    if(DASH_FILTERS.clinic!=='AMBAS' && p.clinica!==DASH_FILTERS.clinic) return false;
    if(DASH_FILTERS.from && (!p.fechaCir || p.fechaCir<DASH_FILTERS.from)) return false;
    if(DASH_FILTERS.to && (!p.fechaCir || p.fechaCir>DASH_FILTERS.to)) return false;
    if(DASH_FILTERS.onlyAlerts && !alertas(p).length) return false;
    if(DASH_FILTERS.onlyActive && ['FACTURADA'].includes((p.estadoFac||'').toUpperCase())) return false;
    return true;
  });
}

  const alertByClinic={'CDU':0,'Gualeguaychú':0}; rows.forEach(p=>{const n=alertas(p).length; if((p.clinica||'')==='CDU') alertByClinic['CDU']+=n; else alertByClinic['Gualeguaychú']+=n;});
  const porMes={}; rows.filter(p=>p.fechaCir).forEach(p=>{const d=parseDateOnly(p.fechaCir); const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; if(!porMes[k]) porMes[k]={prog:0,real:0,fact:0}; if(estado(p)==='FECHA PROGRAMADA') porMes[k].prog++; if(estado(p)!=='FECHA PROGRAMADA') porMes[k].real++; if((p.estadoFac||'').toUpperCase()==='FACTURADA') porMes[k].fact++;});
  const maxAlertType=Math.max(1,...Object.values(alertByType));
  const maxClinic=Math.max(1,...Object.values(alertByClinic));
  const topCrit=rows.map(p=>({p,a:alertas(p).sort((x,y)=>y.days-x.days)[0]})).filter(x=>x.a).sort((x,y)=>y.a.days-x.a.days).slice(0,20);
  document.getElementById('statsView').innerHTML=`

      <label style='font-size:11px'><input type='checkbox' ${DASH_FILTERS.onlyActive?'checked':''} onchange="setDashFilter('onlyActive',this.checked)"> Solo activos</label>
      <label style='font-size:11px'><input type='checkbox' ${DASH_FILTERS.onlyAlerts?'checked':''} onchange="setDashFilter('onlyAlerts',this.checked)"> Solo con alertas</label>

function normText(t){return String(t||'').normalize('NFD').replace(/[̀-ͯ]/g,'').trim().toLowerCase();}
function isEstadoLlegoLenteTxt(txt){const n=normText(txt); return n==='lente llego' || n==='llego lente';}
function normalizePhone(raw){
  let d=String(raw||'').replace(/\D/g,'');
  if(!d) return '';
  if(d.startsWith('00')) d=d.slice(2);
  if(d.startsWith('0')) d=d.slice(1);
  if(d.startsWith('54')) d=d.slice(2);
  if(/^\d{2,4}15\d{6,8}$/.test(d)) d=d.replace(/^(\d{2,4})15(\d{6,8})$/,'$1$2');
  if(d.startsWith('9') && d.length>=11) d=d.slice(1);
  if(!d) return '';
  return '54'+d;
}
function isValidPhone(phone){return !!phone && /^54\d{8,13}$/.test(phone);}
function formatFechaLarga(fechaTexto){
  const d=toDateOnly(fechaTexto);
  if(!d) return String(fechaTexto||'');
  const texto=new Intl.DateTimeFormat('es-AR',{weekday:'long',day:'2-digit',month:'long',timeZone:'America/Argentina/Buenos_Aires'}).format(d).replace(',','').trim();
  const p=texto.split(' ');
  const cap=s=>String(s||'').charAt(0).toUpperCase()+String(s||'').slice(1);
  return `${cap(p[0]||'')} ${p[1]||''} de ${cap(p[3]||p[2]||'')}`.trim();
}
function waFmtTs(iso){if(!iso) return '—'; const dt=new Date(iso); if(isNaN(dt)) return '—'; return `${dt.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})} ${dt.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;}
function waPatientKey(r){return String(r.sourceId||`${r.patient_id||''}|${r.CLINICA||''}|${normText(r.PACIENTE||'')}`);}
function waTracking(r){return WA_TRACKING_MAP[waPatientKey(r)]||{};}
function waTrackingText(r){
  const t=waTracking(r);
  const bits=[];
  if(t.turnoAt) bits.push(`✅ Turno enviado (${waFmtTs(t.turnoAt)})`);
  if(t.docsAt) bits.push(`✅ Docs enviados (${waFmtTs(t.docsAt)})`);
  return bits.join('<br>')||'⏳ Sin envíos';
}
function waGetSourceRow(r){return DB.rows.find(x=>x.id===r.sourceId)||null;}
function waGetRowPhone(r){const over=WA_PHONE_OVERRIDE[waPatientKey(r)]; return String((over ?? r.TELEFONO ?? '')).trim();}
function waGetRowHora(r){const p=waGetSourceRow(r); return (p?.hora_cirugia||p?.hora||r.HORA||'').trim();}
function waStatusText(r){return WA_STATUS_MAP[waPatientKey(r)]||'⏳ Pendiente';}
function waStatusClass(r){const txt=waStatusText(r); if(txt.startsWith('❌')) return 'wa-estado err'; if(txt.startsWith('✅')) return 'wa-estado ok'; return 'wa-estado pend';}
function waSetStatus(r,msg){WA_STATUS_MAP[waPatientKey(r)]=msg;}

}

function waValidateTurno(r,hora){
  if(!WA_GLOBAL_DATE) return 'Seleccione Fecha de cirugía (global).';
  if(!hora) return 'Falta hora del paciente.';
  if(!/^\d{2}:\d{2}$/.test(hora)) return 'Hora inválida (HH:MM).';
  const phone=normalizePhone(waGetRowPhone(r));
  if(!isValidPhone(phone)) return 'Teléfono inválido.';
  return '';
}
function waMarkTurno(r,iso){
  const key=waPatientKey(r);
  WA_TRACKING_MAP[key]=Object.assign({},WA_TRACKING_MAP[key]||{},{turnoAt:iso});
  const p=waGetSourceRow(r);
  if(p){p.wa_turno_enviado_at=iso; save(p);} else save();
  saveWaPrefs();
}
function waMarkDocs(r,iso){
  const key=waPatientKey(r);
  WA_TRACKING_MAP[key]=Object.assign({},WA_TRACKING_MAP[key]||{},{docsAt:iso});
  const p=waGetSourceRow(r);
  if(p){
    p.wa_docs_enviado_at=iso;
    p.estadoCir='Programada';
    p.fechaCir=WA_GLOBAL_DATE||p.fechaCir||'';
    const hora=waGetRowHora(r);
    if(hora){p.hora_cirugia=hora; p.hora=hora;}
    save(p);
  }else save();
  saveWaPrefs();
}
function waEnviarTurno(i){
  const r=WA_ROWS[i]; if(!r) return;
  const hora=waGetRowHora(r);
  const err=waValidateTurno(r,hora);
  if(err){WA_ERRORES++; waSetStatus(r,`❌ ${err}`); waRender(); return false;}
  const phone=normalizePhone(waGetRowPhone(r));
  waSetStatus(r,'✅ Turno enviado');
  const iso=new Date().toISOString();
  waMarkTurno(r,iso);
  WA_ENVIADOS++;
  waRender();
  waDoOpen(phone,waMensajeTurno(r,hora));
  return true;
}
function waEnviarDocs(i){
  const r=WA_ROWS[i]; if(!r) return;
  const key=waPatientKey(r);
  if(!WA_CONFIRMED_MAP[key]){WA_ERRORES++; waSetStatus(r,'❌ Marcar “Confirmó” primero'); waRender(); return false;}
  if(!WA_GLOBAL_DATE){WA_ERRORES++; waSetStatus(r,'❌ Seleccione Fecha global'); waRender(); return false;}
  const hora=waGetRowHora(r);
  if(!hora || !/^\d{2}:\d{2}$/.test(hora)){WA_ERRORES++; waSetStatus(r,'❌ Falta hora del paciente'); waRender(); return false;}
  const phone=normalizePhone(waGetRowPhone(r));
  if(!isValidPhone(phone)){WA_ERRORES++; waSetStatus(r,'❌ Teléfono inválido'); waRender(); return false;}
  const iso=new Date().toISOString();
  waMarkDocs(r,iso);
  waSetStatus(r,'✅ Docs enviados');
  WA_ENVIADOS++;
  waRender();
  waDoOpen(phone,waMensajeDocs(r,hora));
  waAfterDocsAutomation(r);
  return true;
}

function generarScriptRecetas(){
  if(!RECETAS_CTX.row){toast('No hay paciente seleccionado para recetas');return;}
  const afiliado=cleanDigits(document.getElementById('recAfiliado')?.value||'');
  if(!afiliado){toast('Paciente sin afiliado');return;}
  const user=String(document.getElementById('recUser')?.value||'').trim();
  const pass=String(document.getElementById('recPass')?.value||'').trim();
  const diag=String(document.getElementById('recDiag')?.value||'').trim()||RECETAS_DEFAULT.diagnostico;
  const meds=[[1,'a'],[1,'b'],[2,'a'],[2,'b'],[3,'a'],[3,'b']].map(([n,l])=>String(document.getElementById(`recMed${n}${l}`)?.value||'').trim());

  if(!user||!pass){toast('Completar usuario y contraseña PAMI');return;}
  recetasGuardarCreds();
  const payload={

    paciente:RECETAS_CTX.row?.nombre||'',
    obraSocial:RECETAS_CTX.row?.obraSocial||'',
    credenciales:{user,pass},
    diagnostico:diag,

  };
  renderJobStatus('recetasJobStatus','run','⏳ Iniciando automatización de recetas...');

      return connectorPollJob(jobId,(s)=>renderJobStatus('recetasJobStatus','run',`⏳ Ejecutando: ${s.status||'en curso'}`));

def clean_benef(s: str) -> str:
    return re.sub(r"\D", "", (s or "").strip())

def afiliado_no_encontrado(page) -> bool:
    try:
        return page.get_by_text("Afiliado no encontrado", exact=False).is_visible(timeout=800)
    except Exception:
        return False

def handle_save_confirmations(page):
    for _ in range(6):
        try:
            yes_btn = page.locator("button:has-text('Sí'), button:has-text('Si'), button.ui-confirm-button")
            if yes_btn.count() > 0 and yes_btn.first.is_visible():
                yes_btn.first.click(); time.sleep(0.20)
            ok_btn = page.locator("button:has-text('Aceptar'), button:has-text('OK')")
            if ok_btn.count() > 0 and ok_btn.first.is_visible():
                ok_btn.first.click(); time.sleep(0.20)
        except Exception:
            pass
        time.sleep(0.15)

def login_if_needed(page, user: str, password: str):
    if page.locator("input[type='password']").count() == 0: return
    pass_field = page.locator("input[type='password']").first
    for sel in ["input[name*=usuario i]","input[id*=usuario i]","input[name*=user i]","input[id*=user i]","input[type='email']","input[type='text']"]:
        loc = page.locator(sel)
        if loc.count() > 0 and loc.first.is_visible():
            loc.first.fill(user); break
    pass_field.fill(password)
    btn = page.get_by_role("button", name=re.compile("Ingresar|Entrar|Acceder|Iniciar", re.I))
    if btn.count() > 0 and btn.first.is_visible(): btn.first.click()
    else: pass_field.press("Enter")
    try: page.wait_for_load_state("networkidle", timeout=15000)
    except Exception: pass
    print("→ Si pide OTP, cargalo vos en el navegador.")

def get_meds_context(page, timeout_sec=25):
    try:
        page.wait_for_selector("#accion", state="visible", timeout=2500)
        page.wait_for_selector("#t_busqueda", state="visible", timeout=2500)
        return page
    except PWTimeout:
        pass
    t0 = time.time()
    while time.time() - t0 < timeout_sec:
        for fr in page.frames:
            if fr == page.main_frame: continue
            try:
                if fr.locator("#accion").count() > 0 and fr.locator("#t_busqueda").count() > 0:
                    return fr
            except Exception: pass
        time.sleep(0.2)
    raise RuntimeError("No apareció el buscador de medicamentos")

def abrir_buscador_y_elegir(page, idx: int, nombre: str):
    (page.locator(f"#btnNombreComercial_{idx} > span").first if page.locator(f"#btnNombreComercial_{idx} > span").count() else page.locator(f"#btnNombreComercial_{idx}").first).click(force=True)
    ctx = get_meds_context(page, timeout_sec=25)
    ctx.locator("#accion").select_option(label="Nombre Comercial")
    ctx.locator("#t_busqueda").fill(nombre)
    (ctx.locator("input[value='Buscar']").first if ctx.locator("input[value='Buscar']").count() else ctx.get_by_role("button", name=re.compile("BUSCAR|Buscar", re.I)).first).click()
    cell = ctx.locator("xpath=//*[@id='t_busqueda']/ancestor::*[self::div or self::form][1]//following::table[1]//tbody//tr[td]/td[3]").first
    cell.wait_for(state="visible", timeout=15000)
    cell.click(force=True)

def cargar_una_receta(page, benef: str, med_a: str, med_b: str):
    page.goto(PAMI_URL)
    login_if_needed(page, PAMI_USER, PAMI_PASS)
    page.wait_for_selector("#t_benef", timeout=25000)
    page.locator("#t_benef").fill(benef); page.click("body"); time.sleep(0.7)
    if afiliado_no_encontrado(page): raise RuntimeError(f"Afiliado no encontrado: {benef}")
    page.locator("#t_diag_cod_1").fill(DIAG); page.click("body"); time.sleep(0.15)
    abrir_buscador_y_elegir(page, 1, med_a); page.locator("#t_cantidad_1").fill(QTY_1)
    (page.click("#otroMedicamento > span") if page.locator("#otroMedicamento > span").count() else page.click("#otroMedicamento"))
    page.locator("#t_diag_cod_2").fill(DIAG); page.click("body"); time.sleep(0.15)
    abrir_buscador_y_elegir(page, 2, med_b); page.locator("#t_cantidad_2").fill(QTY_2)
    page.click("#btnGuardar"); time.sleep(0.6); handle_save_confirmations(page)

def guardar_resumen(resultados, out_dir="."):
    ts = datetime.now().strftime("%Y%m%d_%H%M%S")
    txt_path = Path(out_dir) / f"resumen_recetas_{ts}.txt"
    csv_path = Path(out_dir) / f"resumen_recetas_{ts}.csv"
    with open(csv_path, "w", newline="", encoding="utf-8") as f:
        w = csv.writer(f); w.writerow(["afiliado","status","recetas_ok","error_receta","error_msg"])
        for r in resultados: w.writerow([r["benef"],r["status"],r["recetas_ok"],r["error_receta"],r["error_msg"]])
    txt_path.write_text("\n".join([f"{x['benef']} | {x['status']} | {x['recetas_ok']}/3" for x in resultados]), encoding="utf-8")
    return str(txt_path), str(csv_path)

def main():
    beneficios=[clean_benef(x) for x in BENEFICIOS if clean_benef(x)]
    if not beneficios: print("No hay afiliados"); return
    resultados=[]
    with sync_playwright() as p:
        context = p.chromium.launch_persistent_context(USER_DATA_DIR, channel="chrome", headless=False)
        page = context.new_page(); page.goto(PAMI_URL); time.sleep(1.2)
        login_if_needed(page, PAMI_USER, PAMI_PASS)
        input("Si PAMI pide OTP, cargalo en el navegador. ENTER para continuar... ")
        for benef in beneficios:
            info={"benef":benef,"status":"ERROR","recetas_ok":0,"error_receta":"","error_msg":""}
            for i,(a,b) in enumerate(MED_PAIRS,start=1):
                try: cargar_una_receta(page, benef, a, b); info["recetas_ok"]+=1
                except Exception as e: info["error_receta"]=str(i); info["error_msg"]=str(e); info["status"]=("PARCIAL" if info["recetas_ok"]>0 else "ERROR"); break
            if info["recetas_ok"]==3: info["status"]="OK"
            resultados.append(info)
        txt_path,csv_path=guardar_resumen(resultados,out_dir=".")
        print(f"Resumen TXT: {txt_path}\nResumen CSV: {csv_path}")
        input("ENTER para cerrar... ")
        context.close()

if __name__ == "__main__":
    main()
`;
}

  const user=String(document.getElementById('lentessUser')?.value||'').trim();

  if(!remember){ localStorage.removeItem(LENTESS_CREDS_KEY); return {user,pass}; }

  return {user,pass};

  const cfg=lentessGuardarCreds();
  if(!cfg.user||!cfg.pass){toast('Completar usuario y contraseña PAMI');return;}
  const payload={credenciales:{user:cfg.user,pass:cfg.pass}, pacientes:rows.map(r=>({afiliado:r.afiliado,ojo:r.ojo,lio:r.lio}))};
  renderJobStatus('lentessJobStatus','run','⏳ Iniciando automatización Lentess...');

      renderJobStatus('lentessJobStatus','run',`⏳ Ejecutando (job ${jobId})`);

    })
    .then(()=>{toast('Lentess completado'); renderJobStatus('lentessJobStatus','ok','✅ Automatización completada');})
    .catch(err=>{
      const msg=String(err?.message||'Error de ejecución');
      toast(msg);
      renderJobStatus('lentessJobStatus',/no detectado/i.test(msg)?'off':'err',`❌ ${msg}`);
    });

  waResetCounters();
  const items=WA_ROWS.map((r,i)=>({r,i})).filter(x=>kind==='docs'?!!WA_CONFIRMED_MAP[waPatientKey(x.r)]:true);
  for(const {i} of items){
    if(WA_STOP) break;
    if(kind==='docs') waEnviarDocs(i); else waEnviarTurno(i);
    await new Promise(r=>setTimeout(r,WA_PREF.delay||4000));
  }
  if(WA_STOP) toast('Envío detenido');
}

function importarBackupJSON(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=()=>{
    const f=inp.files&&inp.files[0]; if(!f) return;
    const fr=new FileReader();
    fr.onload=()=>{
      try{
        const obj=JSON.parse(String(fr.result||'{}'));
        const data=obj.data||obj;
        if(!data.rows||!Array.isArray(data.rows)) throw new Error('formato inválido');
        DB={rows:data.rows,nid:data.nid||((Math.max(...data.rows.map(r=>r.id||0),0))+1),lensStock:data.lensStock||[]};
        SETTINGS=Object.assign(SETTINGS,obj.settings||{});
        ALERT_SILENCES=obj.silences||{};
        saveSettings();
        normalizarData();
        save();
        render();
        toast('Backup importado correctamente');
      }catch(e){
        toast('Error al importar JSON');
      }
    };
    fr.readAsText(f);
  };
  inp.click();
}

function normalizarData(){
  let warnedLegacyCirujano=false;
  DB.rows.forEach(r=>{
    // Migración de esquema legacy / importaciones con encabezados de Excel
    if(r['O.Social'] && !r.obraSocial) r.obraSocial=r['O.Social'];
    if(r['Prequirúrgicos'] && !r.pre) r.pre=r['Prequirúrgicos'];
    if(r['Sol.Lente.'] && !r.fechaSolLente) r.fechaSolLente=r['Sol.Lente.'];
    if(r['Llegó.'] && !r.fechaLlegaLente) r.fechaLlegaLente=r['Llegó.'];
    if(r['Fecha.Cir'] && !r.fechaCir) r.fechaCir=r['Fecha.Cir'];
    if(r['Est.Cir'] && !r.estadoCir) r.estadoCir=r['Est.Cir'];
    if(r['Facturación'] && !r.estadoFac) r.estadoFac=r['Facturación'];
    if('cirujano' in r){ delete r.cirujano; warnedLegacyCirujano=true; }
    r.clinica=normalizarClinica(r.clinica);
    if(!r.fechaCarga) r.fechaCarga=(r.fechaSolLente||r.fechaLlegaLente||r.fechaCir||hoyISO());
    if(!r.createdAt) r.createdAt=new Date().toISOString();
    r.updatedAt=new Date().toISOString();
    r.requires_two_eyes = r.ojos==='2 ojos' || !!r.requires_two_eyes;
    if(!r.dioptria && r.lio) r.dioptria=r.lio;
    if(!r.episode_id) r.episode_id=episodeIdFor(r);
    if(!r.hora) r.hora='';
    normalizeEstadoCir(r);
  });
  DB.lensStock=DB.lensStock||[{model:'AcrySof',dioptria:'20',stock:5},{model:'Akreos',dioptria:'21',stock:3}];
  if(warnedLegacyCirujano) console.warn('[schema-migration] Campo legacy cirujano removido del cache local');
}

function initUX(){
  restoreKpisPref();
  const fv=JSON.parse(localStorage.getItem('cirugias_saved_filters')||'{}');
  ['fCli','fEst','fOS'].forEach(id=>{if(fv[id]!==undefined && document.getElementById(id)) document.getElementById(id).value=fv[id];});
  if(document.getElementById('showSilenced')) document.getElementById('showSilenced').checked=!!fv.showSilenced;
  const q=document.getElementById('q');
  let t;
  q.oninput=()=>{clearTimeout(t); t=setTimeout(()=>{render();},180)};
  ['fCli','fEst','fOS','showSilenced'].forEach(id=>{const el=document.getElementById(id); if(el) el.addEventListener('change',()=>{localStorage.setItem('cirugias_saved_filters', JSON.stringify({fCli:document.getElementById('fCli').value,fEst:document.getElementById('fEst').value,fOS:document.getElementById('fOS').value,showSilenced:document.getElementById('showSilenced').checked}));});});
  document.querySelectorAll('button').forEach(b=>{if(!b.getAttribute('aria-label')) b.setAttribute('aria-label',(b.textContent||'Acción').trim());});
  connectorHealthCheck();
  if(CONNECTOR_HEALTH_TIMER) clearInterval(CONNECTOR_HEALTH_TIMER);
  CONNECTOR_HEALTH_TIMER=setInterval(()=>{ if(CONNECTOR_STATUS!=='run') connectorHealthCheck(); },30000);
  updateStickyMetrics();
  window.addEventListener('resize', updateStickyMetrics);
}
// INIT
(async function() {
  await loadFromServer();
  normalizarData();
  backupDiario();
  initUX();
  render();
})();

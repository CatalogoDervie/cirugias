<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, max-age=0">
  <title>Control de Cirugías - Centro de Ojos Esteves</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <section id="login-view" class="card">
      <h1>Control de Cirugías</h1>
      <p>Centro de Ojos Esteves</p>
      <form id="login-form" autocomplete="on">
        <label>Email<input id="email" type="email" required></label>
        <label>Contraseña<input id="password" type="password" required minlength="6"></label>
        <button type="submit">Ingresar</button>
      </form>
      <p id="login-error" class="error" aria-live="polite"></p>
    </section>

    <main id="main-view" class="hidden">
      <header class="toolbar card">
        <div>
          <h2>Panel administrativo</h2>
          <p id="user-badge"></p>
        </div>
        <button id="logout-btn">Cerrar sesión</button>
      </header>

      <section class="card">
        <div class="grid-controls">
          <input id="search-input" type="search" placeholder="Buscar por paciente, DNI o lente...">
          <select id="filter-status">
            <option value="">Todos los estados</option>
            <option>pendiente</option>
            <option>autorizado</option>
            <option>programado</option>
            <option>realizado</option>
            <option>cancelado</option>
          </select>
          <select id="filter-eye">
            <option value="">Ambos ojos</option>
            <option value="OD">OD</option>
            <option value="OI">OI</option>
          </select>
          <button id="new-record-btn">Nuevo registro</button>
        </div>
        <div id="alerts" class="alerts"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Paciente</th><th>DNI</th><th>Ojo</th><th>Lente</th><th>Estado</th><th>Fecha cirugía</th><th>Autorización</th><th>Acciones</th>
              </tr>
            </thead>
            <tbody id="records-body"></tbody>
          </table>
        </div>
        <div class="pagination">
          <button id="prev-page">Anterior</button>
          <span id="page-indicator">Página 1</span>
          <button id="next-page">Siguiente</button>
        </div>
      </section>

      <section id="editor" class="card hidden">
        <h3 id="editor-title">Nuevo registro</h3>
        <form id="record-form">
          <input type="hidden" id="record-id">
          <div class="form-grid">
            <label>Paciente<input id="f-patient" required></label>
            <label>DNI<input id="f-dni" required></label>
            <label>Ojo<select id="f-eye" required><option value="OD">OD</option><option value="OI">OI</option></select></label>
            <label>Lente intraocular<input id="f-lens" required></label>
            <label>Prequirúrgico<input id="f-preop"></label>
            <label>Estado<select id="f-status" required><option>pendiente</option><option>autorizado</option><option>programado</option><option>realizado</option><option>cancelado</option></select></label>
            <label>Fecha cirugía<input id="f-surgery-date" type="date"></label>
            <label>Autorización<select id="f-authorization"><option value="pendiente">pendiente</option><option value="ok">ok</option><option value="rechazada">rechazada</option></select></label>
            <label>Administrativo a cargo<input id="f-owner"></label>
            <label class="full">Notas<textarea id="f-notes" rows="3"></textarea></label>
          </div>
          <div class="actions">
            <button type="submit" id="save-btn">Guardar</button>
            <button type="button" id="cancel-btn">Cancelar</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>

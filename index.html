<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Cirugías</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f4f8;color:#1a2332;min-height:100vh;font-size:13px}

/* HEADER */
header{background:#fff;border-bottom:2px solid #e2e8f0;padding:0 20px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:200;box-shadow:0 1px 3px #0001}
.logo{font-size:17px;font-weight:700;color:#1a56db;white-space:nowrap}
.logo small{font-weight:400;color:#6b7280;font-size:12px;margin-left:6px}
.hspacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;border:1.5px solid #d1d5db;background:#fff;color:#374151;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}
.btn.primary{background:#1a56db;border-color:#1a56db;color:#fff}
.btn.primary:hover{background:#1e40af;border-color:#1e40af}
.btn.green{background:#059669;border-color:#059669;color:#fff}
.btn.green:hover{background:#047857}
.btn.orange{background:#d97706;border-color:#d97706;color:#fff}
.btn.orange:hover{background:#b45309}
.btn.red{background:#dc2626;border-color:#dc2626;color:#fff}
.btn.red:hover{background:#b91c1c}

/* STATS */
.statsbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 20px;display:flex;gap:10px;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;align-items:center;padding:6px 16px;border-radius:8px;border:1px solid #e2e8f0;min-width:100px;gap:2px}
.stat-n{font-size:22px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
.s-blue .stat-n{color:#1a56db}
.s-green .stat-n{color:#059669}
.s-yellow .stat-n{color:#d97706}
.s-red .stat-n{color:#dc2626}
.s-purple .stat-n{color:#7c3aed}

/* FILTERS */
.filterbar{padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#f8fafc;border-bottom:1px solid #e2e8f0}
.filterbar input,.filterbar select{padding:6px 10px;border:1.5px solid #d1d5db;border-radius:7px;font-family:inherit;font-size:12px;color:#374151;background:#fff;outline:none}
.filterbar input:focus,.filterbar select:focus{border-color:#93c5fd}
.filterbar input{width:220px}
.quick-filters{display:flex;gap:6px;flex-wrap:wrap}
.qf-btn{padding:6px 10px;border:1px solid #d1d5db;border-radius:999px;background:#fff;font-size:11px;cursor:pointer}
.qf-btn.active{background:#1a56db;color:#fff;border-color:#1a56db}
.alerts-toggle{padding:5px 10px;border-radius:6px;border:1.5px solid #fca5a5;background:#fef2f2;color:#dc2626;font-size:11px;font-weight:600;cursor:pointer;display:none}
.alerts-toggle.has-alerts{display:inline-flex;align-items:center;gap:4px}

/* ALERTS PANEL */
.alerts-panel{margin:10px 20px;background:#fff;border:1.5px solid #fca5a5;border-radius:10px;overflow:hidden;display:none}
.alerts-panel.open{display:block}
.alerts-head{background:#fef2f2;padding:8px 14px;font-size:11px;font-weight:600;color:#dc2626;display:flex;justify-content:space-between;align-items:center}
.alert-row{display:flex;align-items:center;gap:10px;padding:7px 14px;border-top:1px solid #fee2e2;cursor:pointer}
.alert-row:hover{background:#fef9f9}
.alert-row .ar-name{font-weight:600;min-width:180px;font-size:12px}
.alert-row .ar-msg{color:#dc2626;font-size:11px;flex:1}
.alert-row .ar-cl{font-size:10px;padding:2px 6px;border-radius:4px}

/* MAIN TABLE AREA */
.tablewrap{margin:10px 20px 20px;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px #0001}
.table-scroll{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 260px)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:10}
thead th{background:#f1f5f9;padding:0;border-bottom:2px solid #e2e8f0;border-right:1px solid #e2e8f0;white-space:nowrap;font-weight:600;color:#374151;font-size:11px;user-select:none}
thead th .th-inner{display:flex;align-items:center;padding:8px 10px;gap:4px;cursor:pointer}
thead th .th-inner:hover{background:#e2e8f0}
thead th.th-check{width:36px;cursor:default}
thead th.th-check .th-inner{justify-content:center;cursor:default}

tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s;cursor:pointer}
tbody tr:hover{background:#f8fafc}
tbody tr.selected{background:#eff6ff!important;outline:2px solid #3b82f6;outline-offset:-2px}
tbody tr.dup-error{background:#fef2f2!important}
tbody tr.dup-error td{border-color:#fecaca}
tbody td{padding:0;border-right:1px solid #f1f5f9;white-space:nowrap;vertical-align:middle}
tbody td .cell{padding:7px 10px;min-height:34px;display:flex;align-items:center}

/* INLINE EDITING */
td.editable .cell{cursor:text}
td.editable .cell:hover{background:#f0f9ff}
td.editing .cell{padding:0}
td.editing input,td.editing select{width:100%;height:34px;padding:0 8px;border:none;border-bottom:2px solid #3b82f6;background:#eff6ff;font-family:inherit;font-size:12px;color:#1a2332;outline:none}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;white-space:nowrap}
.b0{background:#fee2e2;color:#991b1b}   /* FALTA DIOPTRÍA */
.b1{background:#ffedd5;color:#9a3412}   /* FALTA PRE */
.b2{background:#fef9c3;color:#854d0e}   /* LISTO */
.b3{background:#dbeafe;color:#1e40af}   /* SOLICITADA */
.b4{background:#ede9fe;color:#5b21b6}   /* LLEGÓ */
.b5{background:#d1fae5;color:#065f46}   /* PROGRAMADA */
.b6{background:#dcfce7;color:#14532d}   /* REALIZADA */
.b7{background:#bbf7d0;color:#14532d}   /* FACTURADA */
.b8{background:#fce7f3;color:#9d174d}   /* DEVOLVER */
.b9{background:#fef3c7;color:#78350f}   /* FALTA OTRO OJO */
.bcl1{background:#dbeafe;color:#1e40af;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
.bcl2{background:#ede9fe;color:#5b21b6;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}

/* ROW NUMBER */
.rn{color:#9ca3af;font-size:10px;min-width:28px;text-align:right;padding-right:4px!important}

/* CHECKBOX */
.cbx{width:15px;height:15px;cursor:pointer;accent-color:#1a56db}

/* SIDE PANEL */
.side{position:fixed;right:0;top:0;bottom:0;width:400px;background:#fff;border-left:2px solid #e2e8f0;box-shadow:-4px 0 20px #0002;z-index:300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.side.open{transform:translateX(0)}
.side-head{padding:16px 18px;border-bottom:1px solid #e2e8f0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;background:#f8fafc}
.side-name{font-size:15px;font-weight:700;line-height:1.3}
.side-sub{font-size:11px;color:#6b7280;margin-top:2px}
.side-close{background:none;border:none;font-size:20px;color:#9ca3af;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.side-close:hover{color:#374151}
.side-body{flex:1;overflow-y:auto;padding:14px 18px}
.side-foot{padding:12px 18px;border-top:1px solid #e2e8f0;display:flex;gap:8px;flex-wrap:wrap;background:#f8fafc}
.sgroup{margin-bottom:14px}
.sgroup-title{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#6b7280;font-weight:600;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #f1f5f9}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.srow label{font-size:11px;color:#6b7280;min-width:130px;flex-shrink:0}
.srow input,.srow select{flex:1;padding:6px 8px;border:1.5px solid #d1d5db;border-radius:6px;font-family:inherit;font-size:12px;color:#1a2332;outline:none;background:#fff}
.srow input:focus,.srow select:focus{border-color:#93c5fd;background:#f0f9ff}
.estado-calc{padding:6px 10px;border-radius:7px;font-size:12px;font-weight:600;text-align:center;margin-bottom:14px}
.alertas-box{margin-bottom:12px}
.alerta-item{background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;padding:6px 10px;font-size:11px;color:#dc2626;margin-bottom:4px}

/* KANBAN */
.kanban{display:flex;gap:12px;padding:10px 20px 20px;overflow-x:auto}
.kancol{flex:0 0 200px;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px}
.kancol-h{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#6b7280;font-weight:600;display:flex;justify-content:space-between;margin-bottom:8px}
.kancol-n{background:#f1f5f9;padding:1px 6px;border-radius:8px;font-size:11px}
.kancard{background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.kancard:hover{border-color:#93c5fd;transform:translateY(-1px);box-shadow:0 2px 6px #0001}
.kancard-name{font-weight:600;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.kancard-meta{font-size:10px;color:#6b7280;display:flex;gap:5px;flex-wrap:wrap}
.kancard-alert{font-size:10px;color:#dc2626;margin-top:3px}

/* TABS */
.tabrow{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 20px;display:flex;gap:0}
.tablink{padding:10px 16px;font-size:12px;font-weight:500;color:#6b7280;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tablink:hover{color:#1a2332}
.tablink.active{color:#1a56db;border-bottom-color:#1a56db}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a2332;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:1000;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* EMPTY */
.empty{text-align:center;color:#9ca3af;padding:50px;font-style:italic}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}


/* WHATSAPP TAB */
.wa-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px}
.wa-tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.wa-table{width:100%;border-collapse:collapse;font-size:12px}
.wa-table th,.wa-table td{border:1px solid #e5e7eb;padding:6px;text-align:center;vertical-align:middle}
.wa-table th{background:#f0f6ff}
.wa-table input[type='text'],.wa-table input[type='time']{width:100%;padding:5px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px}
.wa-table button:disabled{opacity:.45;cursor:not-allowed}
.wa-estado.ok{color:#059669;font-weight:600}
.wa-estado.err{color:#dc2626;font-weight:600}
.wa-estado.pend{color:#6b7280;font-weight:600}

@media(max-width:640px){.side{width:100%}.statsbar{padding:8px 12px}.tablewrap{margin:8px 12px}}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">👁 OftalmoCirugías <small>control de flujo</small></div>
  <span id="syncBadge" style="font-size:11px;color:#1a56db;display:none"></span>
  <div class="hspacer"></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <button class="btn" onclick="sincronizarAhora()" title="Recargar datos del servidor">↺ Sync</button>
    <button class="btn" onclick="configurarURL()" title="Configurar URL del servidor">⚙ Configurar</button>
    <button class="btn green" onclick="exportarListos()">↓ Exportar Listos</button>
    <button class="btn" onclick="exportarCirugiasDelDia()">📤 Exportar cirugías del día</button>
    <button class="btn" onclick="abrirStockModal()">🧪 Stock lentes</button>
    <button class="btn" onclick="exportarFiltradoExcel()">📄 Exportar vista</button>
    <button class="btn" onclick="exportarBackupJSON()">💾 Backup JSON</button>
    <button class="btn" onclick="importarBackupJSON()">📥 Importar JSON</button>
    <button class="btn primary" onclick="nuevoModal()">+ Nuevo Paciente</button>
  </div>
</header>

<!-- STATS -->
<div class="statsbar" id="statsbar"></div>

<!-- TABS -->
<div class="tabrow">
  <button class="tablink active" onclick="setTab('tabla',this)">📋 Tabla</button>
  <button class="tablink" onclick="setTab('kanban',this)">🗂 Kanban</button>
  <button class="tablink" onclick="setTab('calendario',this)">🗓 Calendario</button>
  <button class="tablink" onclick="setTab('estadisticas',this)">📊 Estadísticas</button>
  <button class="tablink" onclick="setTab('whatsapp',this)">💬 WhatsApp</button>
</div>

<!-- FILTERS -->
<div class="filterbar">
  <input type="text" id="q" placeholder="🔍  Buscar nombre o DNI..." oninput="render()">
  <select id="fCli" onchange="render()">
    <option value="">Todas las clínicas</option>
    <option>CDU</option>
    <option>Gualeguaychú</option>
  </select>
  <select id="fEst" onchange="render()">
    <option value="">Todos los estados</option>
    <option>FALTA DIOPTRÍA</option>
    <option>FALTA PREQUIRÚRGICO</option>
    <option>LISTO PARA PEDIR LENTE</option>
    <option>LENTE SOLICITADA</option>
    <option>LENTE LLEGÓ</option>
    <option>FECHA PROGRAMADA</option>
    <option>CIRUGÍA REALIZADA - FALTA FACTURAR</option>
    <option>FINALIZADO - FACTURADA</option>
    <option>DEVOLVER LENTE</option>
  </select>
  <div class="quick-filters" id="quickFilters">
    <button class="qf-btn active" onclick="setQuickFilter('TODOS', this)">TODOS</button>
    <button class="qf-btn" onclick="setQuickFilter('PROGRAMADAS', this)">PROGRAMADAS</button>
    <button class="qf-btn" onclick="setQuickFilter('LENTE PEDIDA', this)">LENTE PEDIDA</button>
    <button class="qf-btn" onclick="setQuickFilter('REALIZADAS', this)">REALIZADAS</button>
    <button class="qf-btn" onclick="setQuickFilter('FACTURADAS', this)">FACTURADAS</button>
  </div>
  <select id="fOS" onchange="render()">
    <option value="">Todas las obras sociales</option>
    <option>PAMI</option>
    <option>OSER</option>
    <option>PARTICULAR</option>
  </select>
  <label style="font-size:11px;display:flex;align-items:center;gap:4px"><input type="checkbox" id="showSilenced" onchange="render()"> Mostrar silenciadas</label>
  <button class="btn" onclick="configurarAlertas()" style="padding:5px 10px">⚙ Alertas</button>
  <button class="alerts-toggle" id="alertsToggle" onclick="toggleAlerts()">⚠ <span id="alertsCount">0</span> alertas</button>
</div>

<!-- ALERTS PANEL -->
<div class="alerts-panel" id="alertsPanel">
  <div class="alerts-head"><span id="alertsTitle">Alertas</span><button style="background:none;border:none;cursor:pointer;color:#dc2626;font-size:13px" onclick="toggleAlerts()">✕</button></div>
  <div id="alertsList"></div>
</div>

<!-- TABLE VIEW -->
<div id="tabView">
<div class="tablewrap">
  <div class="table-scroll">
    <table id="mainTable">
      <thead>
        <tr>
          <th class="th-check"><div class="th-inner"><input type="checkbox" id="chkAll" onchange="toggleAll(this)"></div></th>
          <th><div class="th-inner" onclick="sortBy('nombre')">#&nbsp; Nombre ↕</div></th>
          <th><div class="th-inner" onclick="sortBy('dni')">DNI ↕</div></th>
          <th><div class="th-inner">Clínica</div></th>
          <th><div class="th-inner">O.Social</div></th>
          <th><div class="th-inner">Ojo</div></th>
          <th><div class="th-inner">Dioptría</div></th>
          <th><div class="th-inner">Prequir.</div></th>
          <th><div class="th-inner" onclick="sortBy('fechaSolLente')">Sol. Lente ↕</div></th>
          <th><div class="th-inner" onclick="sortBy('fechaLlegaLente')">Llegó ↕</div></th>
          <th><div class="th-inner">Recepción</div></th>
          <th><div class="th-inner" onclick="sortBy('fechaCir')">Fecha Cir. ↕</div></th>
          <th><div class="th-inner">Cirujano</div></th><th><div class="th-inner">Est. Cir.</div></th>
          <th><div class="th-inner">Facturación</div></th>
          <th><div class="th-inner">Estado Actual</div></th>
          <th><div class="th-inner">Alertas</div></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
</div>

<!-- KANBAN VIEW -->
<div id="kanView" style="display:none" id="kanView"></div>
<div id="calView" style="display:none;margin:10px 20px 20px"></div>
<div id="statsView" style="display:none;margin:10px 20px 20px"></div>
<div id="waView" style="display:none;margin:10px 20px 20px"></div>

<!-- SIDE PANEL -->
<div class="side" id="sidePanel">
  <div class="side-head">
    <div>
      <div class="side-name" id="sideName">—</div>
      <div class="side-sub" id="sideSub">—</div>
    </div>
    <button class="side-close" onclick="closeSide()">✕</button>
  </div>
  <div class="side-body" id="sideBody"></div>
  <div class="side-foot" id="sideFoot"></div>
</div>
<div id="sideOverlay" style="position:fixed;inset:0;background:#0003;z-index:299;display:none" onclick="closeSide()"></div>

<!-- EXPORT MODAL -->
<div id="exportModal" style="display:none;position:fixed;inset:0;background:#0005;z-index:400;display:none;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;max-width:700px;width:95%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column">
    <div style="padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:15px;font-weight:700">📋 Listos para pedir lente</div>
      <button onclick="closeExport()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#9ca3af">✕</button>
    </div>
    <div style="padding:14px 20px;flex:1;overflow-y:auto" id="exportBody"></div>
    <div style="padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeExport()">Cerrar</button>
      <button class="btn primary" onclick="copyExcel()">Copiar TSV</button>
      <button class="btn green" onclick="downloadExcelListos()">↓ Descargar Excel</button>
    </div>
  </div>
</div>

<!-- STOCK MODAL -->
<div id="stockModal" style="display:none;position:fixed;inset:0;background:#0005;z-index:410;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;max-width:760px;width:95%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column">
    <div style="padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:15px;font-weight:700">🧪 Inventario de lentes</div>
      <button onclick="closeStockModal()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#9ca3af">✕</button>
    </div>
    <div style="padding:14px 20px;flex:1;overflow-y:auto" id="stockBody"></div>
    <div style="padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeStockModal()">Cerrar</button>
      <button class="btn primary" onclick="cargarStockLente()">+ Cargar stock</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// CONFIG — pegá tu URL de Apps Script aquí
// ─────────────────────────────────────────────
let APPS_SCRIPT_URL = localStorage.getItem('apps_script_url') || '';

// ─────────────────────────────────────────────
// DATA LAYER (online + localStorage cache)
// ─────────────────────────────────────────────
let DB = { rows: [], nid: 200 };
let selId = null;
let sortCol = 'nombre', sortDir = 1;
let currentTab = 'tabla';
let isSyncing = false;
let quickFilter = 'TODOS';
const MEDICO_UNICO = 'Dr. Titular';

let SETTINGS = JSON.parse(localStorage.getItem('cirugias_settings')||'{}');
SETTINGS = Object.assign({
  WARN_DAYS:15,
  CRIT_DAYS:50,
  second_eye_missing_days:50,
  lens_arrived_not_scheduled_days:15,
  billing_not_done_days:15,
  lens_delay_days:15,
  scheduled_but_lens_not_arrived_days:7
}, SETTINGS||{});
let ALERT_SILENCES = JSON.parse(localStorage.getItem('cirugias_alert_silences')||'{}');

let WA_ROWS=[];
let WA_ENVIADOS=0;
let WA_ERRORES=0;
let WA_STOP=false;
let WA_STATUS_MAP={};
let WA_TRACKING_MAP=JSON.parse(localStorage.getItem('wa_tracking_map')||'{}');
let WA_CONFIRMED_MAP=JSON.parse(localStorage.getItem('wa_confirmed_map')||'{}');
let WA_PHONE_OVERRIDE=JSON.parse(localStorage.getItem('wa_phone_override')||'{}');

function toDateOnly(d){const dt=parseDateOnly(d); return dt?new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()):null;}
function diffDays(a,b){const da=toDateOnly(a), db=toDateOnly(b); if(!da||!db) return null; return Math.floor((da-db)/86400000);}
function severityByDays(days){if(days>=SETTINGS.CRIT_DAYS) return 'red'; if(days>=Math.max(30,SETTINGS.WARN_DAYS+15)) return 'orange'; if(days>=SETTINGS.WARN_DAYS) return 'yellow'; return 'neutral';}
function saveSettings(){localStorage.setItem('cirugias_settings', JSON.stringify(SETTINGS)); localStorage.setItem('cirugias_alert_silences', JSON.stringify(ALERT_SILENCES));}
function configureIDB(){return new Promise(res=>{if(!window.indexedDB)return res(null); const req=indexedDB.open('cirugias_db',1); req.onupgradeneeded=()=>{req.result.createObjectStore('kv')}; req.onsuccess=()=>res(req.result); req.onerror=()=>res(null);});}
async function idbSet(key,val){const db=await configureIDB(); if(!db) return; await new Promise(r=>{const tx=db.transaction('kv','readwrite'); tx.objectStore('kv').put(val,key); tx.oncomplete=()=>r(); tx.onerror=()=>r();});}
async function idbGet(key){const db=await configureIDB(); if(!db) return null; return await new Promise(r=>{const tx=db.transaction('kv','readonly'); const q=tx.objectStore('kv').get(key); q.onsuccess=()=>r(q.result||null); q.onerror=()=>r(null);});}


async function apiCall(action, data={}) {
  if (!APPS_SCRIPT_URL) return null;
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=' + action, {
      method: 'POST',
      body: JSON.stringify({ action, ...data })
    });
    return await res.json();
  } catch(e) {
    console.error('API error:', e);
    return null;
  }
}

async function loadFromServer() {
  if (!APPS_SCRIPT_URL) {
    // Sin URL configurada → usar datos locales/seed
    const cached = localStorage.getItem('cirugias_cache') || await idbGet('cirugias_cache');
    if (cached) { DB = typeof cached==='string'?JSON.parse(cached):cached; }
    else { DB = { rows: seed(), nid: 200 }; }
    return;
  }
  showSyncBadge('⟳ Cargando...');
  const result = await apiCall('getAll');
  if (result && result.rows) {
    // Convertir ids a número
    result.rows.forEach(r => { r.id = parseInt(r.id)||0; });
    const ids = result.rows.map(r=>r.id).filter(Boolean);
    const maxId = ids.length ? Math.max(...ids) : 0;
    DB = { rows: result.rows, nid: maxId + 1 };
    localStorage.setItem('cirugias_cache', JSON.stringify(DB));
    idbSet('cirugias_cache', DB);
    showSyncBadge('✓ En línea', 'green');
  } else {
    showSyncBadge('⚠ Sin conexión — datos locales', 'orange');
    const cached = localStorage.getItem('cirugias_cache') || await idbGet('cirugias_cache');
    if (cached) DB = typeof cached==='string'?JSON.parse(cached):cached;
  }
}

async function save(changedRow) {
  // Guardar cache local siempre
  backupDiario();
  localStorage.setItem('cirugias_cache', JSON.stringify(DB));
  idbSet('cirugias_cache', DB);
  if (!APPS_SCRIPT_URL || !changedRow) return;
  showSyncBadge('⟳ Guardando...');
  const result = await apiCall('save', { row: changedRow });
  if (result && result.ok) showSyncBadge('✓ Guardado', 'green');
  else showSyncBadge('⚠ Error al guardar', 'red');
}

async function deleteFromServer(id) {
  localStorage.setItem('cirugias_cache', JSON.stringify(DB));
  idbSet('cirugias_cache', DB);
  if (!APPS_SCRIPT_URL) return;
  await apiCall('delete', { id });
}

// ─────────────────────────────────────────────
function hoyISO(){return new Date().toISOString().slice(0,10)}
function parseDateOnly(d){ if(!d) return null; const dt=new Date(d); if(isNaN(dt)) return null; dt.setHours(0,0,0,0); return dt; }
function daysSince(d){ const dt=parseDateOnly(d); if(!dt) return -1; const h=parseDateOnly(hoyISO()); return Math.floor((h-dt)/86400000); }
function clinicaClass(c){ return c==='CDU'?'bcl1':'bcl2'; }
function normalizarClinica(c){ if(c==='Clínica 1'||c==='CDU') return 'CDU'; if(c==='Clínica 2'||c==='Gualeguaychu'||c==='Gualeguaychú') return 'Gualeguaychú'; return c||'CDU'; }
function getDioptria(p){ return p.dioptria||p.lio||''; }
function normalizeEstadoCir(p){
  const fc=toDateOnly(p.fechaCir);
  const hoy=toDateOnly(hoyISO());
  if(!fc){
    if((p.estadoCir||'').toUpperCase()==='PROGRAMADA') p.estadoCir='';
    return;
  }
  p.estadoCir = hoy <= fc ? 'Programada' : 'Realizada';
}
function secondEyeMissing(p){
  if(p.ojos!=='2 ojos') return '';
  const otro = p.ojo==='OD'?'OI':'OD';
  const dni=String(p.dni||'').trim();
  const hasOther=DB.rows.some(x=>x.id!==p.id&&String(x.dni||'').trim()===dni&&x.ojo===otro);
  return hasOther?'':otro;
}
function duplicateNewestIds(){
  const map={};
  DB.rows.forEach(r=>{const k=`${String(r.dni||'').trim()}|${r.ojo||''}`; if(!map[k]) map[k]=[]; map[k].push(r);});
  const dup=new Set();
  Object.values(map).forEach(arr=>{ if(arr.length>1 && arr[0].dni){ arr.sort((a,b)=> (b.id||0)-(a.id||0)); dup.add(arr[0].id); }});
  return dup;
}
function estado(p){
  normalizeEstadoCir(p);
  if(p.recepLente==='Devolver') return 'DEVOLVER LENTE';
  const fac=(p.estadoFac||'').toUpperCase();
  const missEye=secondEyeMissing(p);
  if(fac==='REALIZADA'||fac==='FACTURADA'){
    if(missEye) return `FACTURADA | FALTA ${missEye}`;
    return 'FINALIZADO - FACTURADA';
  }
  if((p.estadoCir||'').toUpperCase()==='REALIZADA') return 'CIRUGÍA REALIZADA - FALTA FACTURAR';
  if(p.fechaCir) return 'FECHA PROGRAMADA';
  if(p.fechaLlegaLente) return 'LENTE LLEGÓ';
  if(p.fechaSolLente) return 'LENTE SOLICITADA';
  if(!getDioptria(p)) return 'FALTA DIOPTRÍA';
  if(!p.pre||p.pre!=='OK') return 'FALTA PREQUIRÚRGICO';
  return 'LISTO PARA PEDIR LENTE';
}
function episodeIdFor(p){
  if(p.episode_id) return p.episode_id;
  const base=(p.fechaCir||p.fechaCarga||hoyISO()).slice(0,7);
  return `${String(p.dni||'').trim()}|${p.clinica||''}|${base}`;
}
function mkAlert(type,p,days,baseDate,eye='NA',msgPrefix=''){
  const d=Math.max(0, days||0);
  const key=`${type}|${String(p.dni||'').trim()}|${p.clinica||''}|${episodeIdFor(p)}|${eye||'NA'}|${baseDate||''}`;
  return {type,days:d,key,severity:severityByDays(d),msg:`${msgPrefix}${d} DÍAS`};
}
function isSilenced(a){ return !!ALERT_SILENCES[a.key]; }
function silenciarAlerta(key){ ALERT_SILENCES[key]={silencedAt:new Date().toISOString()}; saveSettings(); render(); }
function reactivarAlerta(key){ delete ALERT_SILENCES[key]; saveSettings(); render(); }
function alertas(p,opts={}){
  const today=toDateOnly(hoyISO());
  const res=[];
  const showSilenced=!!(document.getElementById('showSilenced')?.checked);
  const st=estado(p);

  // PRIORIDAD ABSOLUTA: DEVOLVER LENTE
  if(p.recepLente==='Devolver' || st==='DEVOLVER LENTE'){
    const a={type:'devolver',days:SETTINGS.CRIT_DAYS,key:`devolver|${p.id}|${p.recepLente||'DEVOLVER'}`,severity:'red',msg:'⚠ DEVOLVER LENTE'};
    if(opts.raw) return [a];
    return (showSilenced || !isSilenced(a)) ? [a] : [];
  }

  if((!p.fechaCir || p.fechaCir==='FECHA NO ASIGNADA')){
    const base=p.createdAt||p.updatedAt||p.fechaCarga||hoyISO();
    const d=diffDays(today, base);
    if(d!==null && d>=SETTINGS.WARN_DAYS) res.push(mkAlert('not_scheduled',p,d,base,p.ojo,'FECHA NO PROGRAMADA '));
  }

  if(p.fechaSolLente && !p.fechaLlegaLente){
    const d=diffDays(today,p.fechaSolLente);
    if(d!==null && d>=Math.max(SETTINGS.WARN_DAYS, SETTINGS.lens_delay_days)) res.push(mkAlert('lens_delay',p,d,p.fechaSolLente,p.ojo,'DEMORA LENTE '));
  }

  if(p.fechaLlegaLente && !p.fechaCir){
    const d=diffDays(today,p.fechaLlegaLente);
    if(d!==null && d>=Math.max(SETTINGS.WARN_DAYS, SETTINGS.lens_arrived_not_scheduled_days)) res.push(mkAlert('arrived_not_scheduled',p,d,p.fechaLlegaLente,p.ojo,'LENTE LLEGÓ Y NO PROGRAMADA '));
  }

  if(p.fechaCir && st==='FECHA PROGRAMADA' && !p.fechaLlegaLente){
    const dts=diffDays(p.fechaCir,today);
    if(dts!==null && dts<=SETTINGS.scheduled_but_lens_not_arrived_days) res.push({type:'scheduled_no_lens',days:dts,key:`scheduled_no_lens|${p.id}|${p.fechaCir}`,severity:dts<=0?'red':'yellow',msg:`CIRUGÍA PRÓXIMA SIN LENTE (${dts} DÍAS)`});
  }

  const fac=(p.estadoFac||'').toUpperCase();
  const facturacionRealizada = fac==='REALIZADA' || fac==='FACTURADA';
  if((st==='CIRUGÍA REALIZADA - FALTA FACTURAR' || st==='FINALIZADO - FACTURADA') && !facturacionRealizada){
    const d=diffDays(today,p.fechaCir);
    if(d!==null && d>=Math.max(SETTINGS.WARN_DAYS, SETTINGS.billing_not_done_days)) res.push(mkAlert('billing_pending',p,d,p.fechaCir,p.ojo,'FACTURACIÓN NO REALIZADA '));
  }

  // FALTA 2º OJO (crítico) aunque no exista segunda fila
  if(p.ojos==='2 ojos' || p.requires_two_eyes){
    const dni=String(p.dni||'').trim();
    const epi=episodeIdFor(p);
    const episodeRows=DB.rows.filter(x=>String(x.dni||'').trim()===dni && episodeIdFor(x)===epi);
    const realized=episodeRows.filter(x=>estado(x)==='CIRUGÍA REALIZADA - FALTA FACTURAR' || estado(x)==='FINALIZADO - FACTURADA');
    const eyes=new Set(realized.map(x=>x.ojo).filter(Boolean));
    if(realized.length>=1 && eyes.size<2){
      const first=realized.map(x=>x.fechaCir).filter(Boolean).sort()[0];
      if(first){
        const d=diffDays(today,first);
        if(d!==null && d>=Math.max(SETTINGS.CRIT_DAYS, SETTINGS.second_eye_missing_days)) res.push(mkAlert('second_eye_missing',p,d,first,'NA','FALTA 2° OJO – '));
      }
    }
  }

  const unique=[]; const seen=new Set();
  res.forEach(a=>{if(!seen.has(a.key)){seen.add(a.key); unique.push(a);}});
  if(opts.raw) return unique;
  return unique.filter(a=>showSilenced || !isSilenced(a));
}

const BCLS={
  'FALTA DIOPTRÍA':'b0','FALTA PREQUIRÚRGICO':'b1','LISTO PARA PEDIR LENTE':'b2',
  'LENTE SOLICITADA':'b3','LENTE LLEGÓ':'b4','FECHA PROGRAMADA':'b5',
  'CIRUGÍA REALIZADA - FALTA FACTURAR':'b6','FINALIZADO - FACTURADA':'b7',
  'DEVOLVER LENTE':'b8'
};
function bc(e){if(e&&e.startsWith('FACTURADA |'))return 'b9';return BCLS[e]||'b3'}
function fd(d){if(!d)return '—';const dt=new Date(d);if(isNaN(dt))return '—';return dt.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'})}
function fdInput(d){if(!d)return '';return d.split('T')[0]}

function filtered(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const fc=document.getElementById('fCli').value;
  const fe=document.getElementById('fEst').value;
  const fo=document.getElementById('fOS').value;
  let rows=[...DB.rows];
  if(q) rows=rows.filter(p=>(p.nombre||'').toLowerCase().includes(q)||String(p.dni||'').includes(q));
  if(fc) rows=rows.filter(p=>p.clinica===fc);
  if(fe) rows=rows.filter(p=>estado(p)===fe);
  if(fo) rows=rows.filter(p=>p.obraSocial===fo);
  if(quickFilter==='PROGRAMADAS') rows=rows.filter(p=>estado(p)==='FECHA PROGRAMADA');
  if(quickFilter==='LENTE PEDIDA') rows=rows.filter(p=>estado(p)==='LENTE SOLICITADA');
  if(quickFilter==='REALIZADAS') rows=rows.filter(p=>(p.estadoCir||'').toUpperCase()==='REALIZADA');
  if(quickFilter==='FACTURADAS') rows=rows.filter(p=>['REALIZADA','FACTURADA'].includes((p.estadoFac||'').toUpperCase()));
  rows.sort((a,b)=>{
    const va=a[sortCol]||'',vb=b[sortCol]||'';
    return va<vb?-sortDir:va>vb?sortDir:0;
  });
  return rows;
}

function setQuickFilter(f,el){
  quickFilter=f;
  document.querySelectorAll('.qf-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  render();
}

function sortBy(col){sortCol=col;sortDir=sortCol===col?-sortDir:1;render()}

function renderStats(){
  const all=DB.rows;
  let nalerts=0,nPedidas=0,nprog=0,nreal=0,nCDU=0,nGchu=0,nFact=0,nPendFac=0,nCrit=0;
  const stockCritico=(DB.lensStock||[]).filter(x=>(x.stock||0)<=1).length;
  all.forEach(p=>{
    const ars=alertas(p);
    nalerts+=ars.length;
    nCrit+=ars.filter(a=>a.severity==='red').length;
    const e=estado(p);
    if(e==='LENTE SOLICITADA') nPedidas++;
    if(e==='FECHA PROGRAMADA') nprog++;
    if(e==='CIRUGÍA REALIZADA - FALTA FACTURAR' || e==='FINALIZADO - FACTURADA') nreal++;
    if((p.estadoFac||'').toUpperCase()==='FACTURADA') nFact++;
    if((e==='CIRUGÍA REALIZADA - FALTA FACTURAR') && (p.estadoFac||'').toUpperCase()!=='FACTURADA') nPendFac++;
    if(p.clinica==='CDU') nCDU++;
    if(p.clinica==='Gualeguaychú' || p.clinica==='Gualeguaychú') nGchu++;
  });
  document.getElementById('statsbar').innerHTML=`
    <div class="stat s-blue"><div class="stat-n">${new Set(all.map(x=>String(x.dni||'').trim()).filter(Boolean)).size}</div><div class="stat-l">Total pacientes</div></div>
    <div class="stat s-purple"><div class="stat-n">${all.length}</div><div class="stat-l">Total cirugías</div></div>
    <div class="stat s-yellow"><div class="stat-n">${nprog}</div><div class="stat-l">Programadas</div></div>
    <div class="stat s-green"><div class="stat-n">${nreal}</div><div class="stat-l">Realizadas</div></div>
    <div class="stat s-green"><div class="stat-n">${nFact}</div><div class="stat-l">Facturadas</div></div>
    <div class="stat s-red"><div class="stat-n">${nPendFac}</div><div class="stat-l">Pend. facturar</div></div>
    <div class="stat s-red"><div class="stat-n">${nalerts}</div><div class="stat-l">Alertas activas</div></div>
    <div class="stat s-red"><div class="stat-n">${nCrit}</div><div class="stat-l">Alertas críticas</div></div>
    <div class="stat"><div class="stat-n">${nCDU}</div><div class="stat-l">CDU</div></div>
    <div class="stat"><div class="stat-n">${nGchu}</div><div class="stat-l">Gualeguaychú</div></div>
    <div class="stat s-red"><div class="stat-n">${stockCritico}</div><div class="stat-l">Stock crítico</div></div>`;
  const btn=document.getElementById('alertsToggle');
  document.getElementById('alertsCount').textContent=nalerts;
  btn.classList.toggle('has-alerts',nalerts>0);
}

// INLINE EDITING (doble click en celda)
// ─────────────────────────────────────────────
function inlineEdit(e,id,field){
  e.stopPropagation();
  const td=e.currentTarget;
  const p=DB.rows.find(x=>x.id===id);
  td.classList.add('editing');
  td.innerHTML=`<input type="text" value="${p[field]||''}" autofocus onblur="commitInline(event,${id},'${field}')" onkeydown="if(event.key==='Enter')event.target.blur();if(event.key==='Escape'){event.target.dataset.cancel='1';event.target.blur()}">`;
  td.querySelector('input').focus();
}

function inlineEditDate(e,id,field){
  e.stopPropagation();
  const td=e.currentTarget;
  const p=DB.rows.find(x=>x.id===id);
  td.classList.add('editing');
  td.innerHTML=`<input type="date" value="${fdInput(p[field])}" autofocus onblur="commitInline(event,${id},'${field}')" onkeydown="if(event.key==='Enter')event.target.blur();if(event.key==='Escape'){event.target.dataset.cancel='1';event.target.blur()}">`;
  td.querySelector('input').focus();
}

function inlineEditSel(e,id,field,opts){
  e.stopPropagation();
  const td=e.currentTarget;
  const p=DB.rows.find(x=>x.id===id);
  td.classList.add('editing');
  const optsHtml=opts.map(o=>`<option value="${o}" ${p[field]===o?'selected':''}>${o||'—'}</option>`).join('');
  td.innerHTML=`<select autofocus onblur="commitInline(event,${id},'${field}')" onchange="this.blur()">${optsHtml}</select>`;
  td.querySelector('select').focus();
}

function commitInline(e,id,field){
  const el=e.target;
  if(el.dataset.cancel){render();return}
  const val=el.value;
  const p=DB.rows.find(x=>x.id===id);
  p[field]=val;
  save();
  render();
  toast('✓ Guardado');
}

function duplicarPaciente(id){
  const orig=DB.rows.find(x=>x.id===id);
  if(!orig){return}
  const copia={...orig};
  copia.id=DB.nid++;
  copia.ojo=orig.ojo==='OD'?'OI':'OD';
  copia.ojos='2 ojos';
  // Reset flujo lente/cirugia
  copia.fechaSolLente='';
  copia.fechaLlegaLente='';
  copia.recepLente='';
  copia.fechaCir='';
  copia.estadoCir='';
  copia.estadoFac='';
  copia.notas=`Copia de ${orig.nombre} — ${orig.ojo} → ${copia.ojo}`;
  DB.rows.push(copia);
  save(copia);
  render();
  closeSide();
  setTimeout(()=>{openSide(copia.id)},100);
  toast(`✓ Duplicado para ojo ${copia.ojo}`);
}

let DASH_FILTERS={from:'',to:'',clinic:'AMBAS',onlyAlerts:false,onlyActive:false};
function getDashboardRows(){
  return DB.rows.filter(p=>{
    if(DASH_FILTERS.clinic!=='AMBAS' && p.clinica!==DASH_FILTERS.clinic) return false;
    if(DASH_FILTERS.from && (!p.fechaCir || p.fechaCir<DASH_FILTERS.from)) return false;
    if(DASH_FILTERS.to && (!p.fechaCir || p.fechaCir>DASH_FILTERS.to)) return false;
    if(DASH_FILTERS.onlyAlerts && !alertas(p).length) return false;
    if(DASH_FILTERS.onlyActive && ['FACTURADA'].includes((p.estadoFac||'').toUpperCase())) return false;
    return true;
  });
}

  const maxAlertType=Math.max(1,...Object.values(alertByType));
  const maxClinic=Math.max(1,...Object.values(alertByClinic));
  const topCrit=rows.map(p=>({p,a:alertas(p).sort((x,y)=>y.days-x.days)[0]})).filter(x=>x.a).sort((x,y)=>y.a.days-x.a.days).slice(0,20);
  document.getElementById('statsView').innerHTML=`

      <label style='font-size:11px'><input type='checkbox' ${DASH_FILTERS.onlyActive?'checked':''} onchange="setDashFilter('onlyActive',this.checked)"> Solo activos</label>
      <label style='font-size:11px'><input type='checkbox' ${DASH_FILTERS.onlyAlerts?'checked':''} onchange="setDashFilter('onlyAlerts',this.checked)"> Solo con alertas</label>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">
      <div class="stat s-blue"><div class="stat-n">${new Set(rows.map(x=>String(x.dni||'').trim()).filter(Boolean)).size}</div><div class="stat-l">Total pacientes</div></div>
      <div class="stat s-purple"><div class="stat-n">${rows.length}</div><div class="stat-l">Total cirugías</div></div>

function normText(t){return String(t||'').normalize('NFD').replace(/[̀-ͯ]/g,'').trim().toLowerCase();}
function isEstadoLlegoLenteTxt(txt){const n=normText(txt); return n==='lente llego' || n==='llego lente';}
function normalizePhone(raw){
  let d=String(raw||'').replace(/\D/g,'');
  if(!d) return '';
  if(d.startsWith('00')) d=d.slice(2);
  if(d.startsWith('0')) d=d.slice(1);
  if(d.startsWith('54')) d=d.slice(2);
  if(/^\d{2,4}15\d{6,8}$/.test(d)) d=d.replace(/^(\d{2,4})15(\d{6,8})$/,'$1$2');
  if(d.startsWith('9') && d.length>=11) d=d.slice(1);
  if(!d) return '';
  return '54'+d;
}
function isValidPhone(phone){return !!phone && /^54\d{8,13}$/.test(phone);}
function formatFechaLarga(fechaTexto){
  const d=toDateOnly(fechaTexto);
  if(!d) return String(fechaTexto||'');
  const texto=new Intl.DateTimeFormat('es-AR',{weekday:'long',day:'2-digit',month:'long',timeZone:'America/Argentina/Buenos_Aires'}).format(d).replace(',','').trim();
  const p=texto.split(' ');
  const cap=s=>String(s||'').charAt(0).toUpperCase()+String(s||'').slice(1);
  return `${cap(p[0]||'')} ${p[1]||''} de ${cap(p[3]||p[2]||'')}`.trim();
}
function waFmtTs(iso){if(!iso) return '—'; const dt=new Date(iso); if(isNaN(dt)) return '—'; return `${dt.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})} ${dt.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;}
function waPatientKey(r){return String(r.sourceId||`${r.patient_id||''}|${r.CLINICA||''}|${normText(r.PACIENTE||'')}`);}
function waTracking(r){return WA_TRACKING_MAP[waPatientKey(r)]||{};}
function waTrackingText(r){
  const t=waTracking(r);
  const bits=[];
  if(t.turnoAt) bits.push(`✅ Turno enviado (${waFmtTs(t.turnoAt)})`);
  if(t.docsAt) bits.push(`✅ Docs enviados (${waFmtTs(t.docsAt)})`);
  return bits.join('<br>')||'⏳ Sin envíos';
}
function waGetSourceRow(r){return DB.rows.find(x=>x.id===r.sourceId)||null;}
function waGetRowPhone(r){const over=WA_PHONE_OVERRIDE[waPatientKey(r)]; return String((over ?? r.TELEFONO ?? '')).trim();}
function waGetRowHora(r){const p=waGetSourceRow(r); return (p?.hora_cirugia||p?.hora||r.HORA||'').trim();}
function waStatusText(r){return WA_STATUS_MAP[waPatientKey(r)]||'⏳ Pendiente';}
function waStatusClass(r){const txt=waStatusText(r); if(txt.startsWith('❌')) return 'wa-estado err'; if(txt.startsWith('✅')) return 'wa-estado ok'; return 'wa-estado pend';}
function waSetStatus(r,msg){WA_STATUS_MAP[waPatientKey(r)]=msg;}
function waFromInternal(){
  let base=filtered();
  const rows=base.map(p=>({
    source:'internal', sourceId:p.id, patient_id:String(p.dni||''),
    PACIENTE:p.nombre||'', TELEFONO:p.tel||'', FECHA:p.fechaCir||'', HORA:(p.hora_cirugia||p.hora||''),
    ESTADO:estado(p), CLINICA:p.clinica||''
  }));
  return WA_PREF.onlyLlego ? rows.filter(r=>isEstadoLlegoLenteTxt(r.ESTADO)) : rows;
}
function waRender(){
  const body=document.getElementById('waTbody'); if(!body) return;
  WA_ROWS=waFromInternal();
  body.innerHTML='';
  WA_ROWS.forEach((r,i)=>{
    const key=waPatientKey(r);
    const confirmed=!!WA_CONFIRMED_MAP[key];
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${i+1}</td><td style='text-align:left'>${r.PACIENTE||''}<div style='color:#6b7280;font-size:11px'>DNI: ${r.patient_id||'—'}</div></td><td>${r.CLINICA||''}</td>
      <td><input class='wa-phone' data-k='${key}' value='${waGetRowPhone(r)}' placeholder='Teléfono'></td>
      <td><input class='wa-hora' data-id='${r.sourceId||''}' value='${waGetRowHora(r)}' type='time'></td>
      <td>${r.ESTADO||'—'}</td>
      <td><label style='display:flex;justify-content:center;gap:4px'><input type='checkbox' class='wa-confirm' data-k='${key}' ${confirmed?'checked':''}><span>Sí</span></label></td>
      <td class='wa-track'>${waTrackingText(r)}</td>
      <td><div style='display:flex;flex-direction:column;gap:6px'>
        <button class='btn wa-turno'>📩 Confirmar turno</button>
        <button class='btn wa-docs' ${confirmed?'':'disabled'}>📎 Enviar documentos</button>
      </div></td>
      <td class='${waStatusClass(r)}'>${waStatusText(r)}</td>`;
    body.appendChild(tr);
    tr.querySelector('.wa-turno').onclick=()=>waEnviarTurno(i);
    tr.querySelector('.wa-docs').onclick=()=>waEnviarDocs(i);
    tr.querySelector('.wa-confirm').onchange=(e)=>{WA_CONFIRMED_MAP[key]=!!e.target.checked; saveWaPrefs(); waRender();};
    const phoneInput=tr.querySelector('.wa-phone');
    phoneInput.onblur=()=>waSavePhoneOverride(key,phoneInput.value);
    phoneInput.onkeydown=(e)=>{if(e.key==='Enter'){e.preventDefault(); phoneInput.blur();}};
    const horaInput=tr.querySelector('.wa-hora');
    horaInput.onchange=()=>waSaveHora(r,horaInput.value);
  });
  waCounter();
}
function waSaveHora(r,val){
  if(val && !/^\d{2}:\d{2}$/.test(val)){waSetStatus(r,'❌ Hora inválida (HH:MM)'); waRender(); return;}
  const p=waGetSourceRow(r); if(!p) return;
  p.hora_cirugia=val||'';
  p.hora=val||'';
  save(p);
  waSetStatus(r,'✅ Hora guardada');
  render();
}
function waSavePhoneOverride(key,val){
  const v=String(val||'').trim();
  if(!v) delete WA_PHONE_OVERRIDE[key];
  else WA_PHONE_OVERRIDE[key]=v;
  saveWaPrefs();
}
function waCounter(){const c=document.getElementById('waContador'); if(c) c.innerText=`Enviados: ${WA_ENVIADOS} | Errores: ${WA_ERRORES}`;}
function waResetCounters(){WA_ENVIADOS=0; WA_ERRORES=0; waCounter();}
function waBuildUrl(phone,msg){return WA_PREF.channel==='web' ? `https://web.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(msg)}` : `whatsapp://send?phone=${phone}&text=${encodeURIComponent(msg)}`;}
function waDoOpen(phone,msg){window.location.href=waBuildUrl(phone,msg);}
function waOjoTexto(ojo){
  const o=String(ojo||'').toUpperCase();
  if(o.includes('OD')) return 'Derecho';
  if(o.includes('OI')) return 'Izquierdo';
  return '';
}
function waRenderTemplate(tpl,r,hora){
  const vars={
    PACIENTE:r.PACIENTE||'',
    FECHA_LARGA:formatFechaLarga(WA_GLOBAL_DATE),
    HORA:hora||'',
    OJO:(r.OJO||''),
    OJO_TEXTO:waOjoTexto(r.OJO)
  };
  return String(tpl||'').replace(/\{\{\s*(PACIENTE|FECHA_LARGA|HORA|OJO|OJO_TEXTO)\s*\}\}/g,(_,k)=>String(vars[k]||''));
}
const WA_CONFIRM_TPL=`Buenas tardes, {{PACIENTE}}.

Desde el *Centro de Ojos Esteves* le confirmamos su cirugía en *Gualeguaychú* para el día *{{FECHA_LARGA}}* a las *{{HORA}}HS* (presentarse 30 minutos antes).

Por favor confirme si puede asistir para enviarle los preparativos y documentación de la cirugía del *ojo {{OJO_TEXTO}}*.`;
const WA_DOCS_TPL=`Le enviamos los documentos para la cirugía del *ojo {{OJO_TEXTO}}* programada para el *{{FECHA_LARGA}}* a las *{{HORA}}HS*.

📎 Adjuntamos:
1) *Preparación quirúrgica*
2) *Consentimiento informado*

Por favor, *lea con mucha atención* la preparación y *lleve impreso y firmado* el consentimiento informado el día de la cirugía.

📍 Dirección (Gualeguaychú):
https://share.google/KQuwuBRJt0ZMQj7KX

Si tiene alguna duda, responda a este mensaje y la ayudamos.`;
function waMensajeTurno(r,hora){
  return waRenderTemplate(WA_CONFIRM_TPL,r,hora);
}
function waMensajeDocs(r,hora){
  return waRenderTemplate(WA_DOCS_TPL,r,hora);
}
function waValidateTurno(r,hora){
  if(!WA_GLOBAL_DATE) return 'Seleccione Fecha de cirugía (global).';
  if(!hora) return 'Falta hora del paciente.';
  if(!/^\d{2}:\d{2}$/.test(hora)) return 'Hora inválida (HH:MM).';
  const phone=normalizePhone(waGetRowPhone(r));
  if(!isValidPhone(phone)) return 'Teléfono inválido.';
  return '';
}
function waMarkTurno(r,iso){
  const key=waPatientKey(r);
  WA_TRACKING_MAP[key]=Object.assign({},WA_TRACKING_MAP[key]||{},{turnoAt:iso});
  const p=waGetSourceRow(r);
  if(p){p.wa_turno_enviado_at=iso; save(p);} else save();
  saveWaPrefs();
}
function waMarkDocs(r,iso){
  const key=waPatientKey(r);
  WA_TRACKING_MAP[key]=Object.assign({},WA_TRACKING_MAP[key]||{},{docsAt:iso});
  const p=waGetSourceRow(r);
  if(p){
    p.wa_docs_enviado_at=iso;
    p.estadoCir='Programada';
    p.fechaCir=WA_GLOBAL_DATE||p.fechaCir||'';
    const hora=waGetRowHora(r);
    if(hora){p.hora_cirugia=hora; p.hora=hora;}
    save(p);
  }else save();
  saveWaPrefs();
}
function waEnviarTurno(i){
  const r=WA_ROWS[i]; if(!r) return;
  const hora=waGetRowHora(r);
  const err=waValidateTurno(r,hora);
  if(err){WA_ERRORES++; waSetStatus(r,`❌ ${err}`); waRender(); return false;}
  const phone=normalizePhone(waGetRowPhone(r));
  waSetStatus(r,'✅ Turno enviado');
  const iso=new Date().toISOString();
  waMarkTurno(r,iso);
  WA_ENVIADOS++;
  waRender();
  waDoOpen(phone,waMensajeTurno(r,hora));
  return true;
}
function waEnviarDocs(i){
  const r=WA_ROWS[i]; if(!r) return;
  const key=waPatientKey(r);
  if(!WA_CONFIRMED_MAP[key]){WA_ERRORES++; waSetStatus(r,'❌ Marcar “Confirmó” primero'); waRender(); return false;}
  if(!WA_GLOBAL_DATE){WA_ERRORES++; waSetStatus(r,'❌ Seleccione Fecha global'); waRender(); return false;}
  const hora=waGetRowHora(r);
  if(!hora || !/^\d{2}:\d{2}$/.test(hora)){WA_ERRORES++; waSetStatus(r,'❌ Falta hora del paciente'); waRender(); return false;}
  const phone=normalizePhone(waGetRowPhone(r));
  if(!isValidPhone(phone)){WA_ERRORES++; waSetStatus(r,'❌ Teléfono inválido'); waRender(); return false;}
  window.open('https://catalogodervie.github.io/cirugias/PREPARACIN%20PARA%20LA%20CIRUGIA.pdf','_blank');
  window.open('https://catalogodervie.github.io/cirugias/CONSENTIMIENTO%20CX%202026.pdf','_blank');
  const iso=new Date().toISOString();
  waMarkDocs(r,iso);
  waSetStatus(r,'✅ Docs enviados');
  WA_ENVIADOS++;
  waRender();
  waDoOpen(phone,waMensajeDocs(r,hora));
  return true;
}
async function waLoop(kind){
  WA_STOP=false;
  waResetCounters();
  const items=WA_ROWS.map((r,i)=>({r,i})).filter(x=>kind==='docs'?!!WA_CONFIRMED_MAP[waPatientKey(x.r)]:true);
  for(const {i} of items){
    if(WA_STOP) break;
    if(kind==='docs') waEnviarDocs(i); else waEnviarTurno(i);
    await new Promise(r=>setTimeout(r,WA_PREF.delay||4000));
  }
  if(WA_STOP) toast('Envío detenido');
}
function waStopLoop(){WA_STOP=true;}
function waResetTracking(){
  if(!confirm('¿Resetear tracking WhatsApp (turno/docs/confirmados/teléfonos override)?')) return;
  WA_TRACKING_MAP={};
  WA_CONFIRMED_MAP={};
  WA_PHONE_OVERRIDE={};
  DB.rows.forEach(p=>{delete p.wa_turno_enviado_at; delete p.wa_docs_enviado_at;});
  save();
  saveWaPrefs();
  waResetCounters();
  WA_STATUS_MAP={};
  waRender();
}

  document.getElementById('waStartTurnos').onclick=()=>waLoop('turnos');
  document.getElementById('waStartDocs').onclick=()=>waLoop('docs');
  document.getElementById('waStop').onclick=()=>waStopLoop();
  document.getElementById('waReset').onclick=()=>waResetTracking();
  waRender();
}

function exportarCirugiasDelDia(){

function cargarStockLente(){
  const model=prompt('Modelo de lente:'); if(!model) return;

function importarBackupJSON(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=()=>{
    const f=inp.files&&inp.files[0]; if(!f) return;
    const fr=new FileReader();
    fr.onload=()=>{
      try{
        const obj=JSON.parse(String(fr.result||'{}'));
        const data=obj.data||obj;
        if(!data.rows||!Array.isArray(data.rows)) throw new Error('formato inválido');
        DB={rows:data.rows,nid:data.nid||((Math.max(...data.rows.map(r=>r.id||0),0))+1),lensStock:data.lensStock||[]};
        SETTINGS=Object.assign(SETTINGS,obj.settings||{});
        ALERT_SILENCES=obj.silences||{};
        saveSettings();
        normalizarData();
        save();
        render();
        toast('Backup importado correctamente');
      }catch(e){
        toast('Error al importar JSON');
      }
    };
    fr.readAsText(f);
  };
  inp.click();
}

}

function initUX(){
  const fv=JSON.parse(localStorage.getItem('cirugias_saved_filters')||'{}');
  ['fCli','fEst','fOS'].forEach(id=>{if(fv[id]!==undefined && document.getElementById(id)) document.getElementById(id).value=fv[id];});
  if(document.getElementById('showSilenced')) document.getElementById('showSilenced').checked=!!fv.showSilenced;
  const q=document.getElementById('q');
  let t;
  q.oninput=()=>{clearTimeout(t); t=setTimeout(()=>{render();},180)};
  ['fCli','fEst','fOS','showSilenced'].forEach(id=>{const el=document.getElementById(id); if(el) el.addEventListener('change',()=>{localStorage.setItem('cirugias_saved_filters', JSON.stringify({fCli:document.getElementById('fCli').value,fEst:document.getElementById('fEst').value,fOS:document.getElementById('fOS').value,showSilenced:document.getElementById('showSilenced').checked}));});});
}

<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Importador de Cirugías</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 980px; margin: 0 auto; padding: 16px; background: #f5f7fb; }
    .box { background: #fff; border: 1px solid #d7dfea; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    label, input, textarea, button { display: block; width: 100%; }
    input, textarea, button { margin-top: 6px; margin-bottom: 10px; padding: 9px; border: 1px solid #cfd8e6; border-radius: 8px; font: inherit; }
    button { background: #1558db; color: #fff; border: none; cursor: pointer; }
    .msg { min-height: 20px; }
    .error { color: #aa1d1d; }
    .ok { color: #126b33; }
  </style>
</head>
<body>
  <h1>Importador de datos (colección cirugias)</h1>
  <p>Uso interno técnico. Requiere usuario admin autenticado.</p>

  <section class="box">
    <h2>Ingreso</h2>
    <label>Usuario<input id="username" type="text" /></label>
    <label>Contraseña<input id="password" type="password" /></label>
    <button id="login-btn">Ingresar</button>
    <p id="auth-msg" class="msg"></p>
  </section>

  <section class="box">
    <h2>Importar JSON</h2>
    <label>Pegar arreglo JSON de registros</label>
    <textarea id="json-input" rows="15" placeholder='[{"patientName":"...","dni":"..."}]'></textarea>
    <button id="import-btn">Importar en Firestore</button>
    <p id="import-msg" class="msg"></p>
  </section>

  <script type="module">
    import { auth, db, appConfig } from './js/firebase.js';
    import { loginWithUsername, getUserProfile } from './js/auth.js';
    import { collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

    const authMsg = document.getElementById('auth-msg');
    const importMsg = document.getElementById('import-msg');
    let profile = null;

    const setMsg = (el, text, ok = false) => {
      el.textContent = text;
      el.className = `msg ${ok ? 'ok' : 'error'}`;
    };

    document.getElementById('login-btn').addEventListener('click', async () => {
      try {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const result = await loginWithUsername(username, password);
        profile = await getUserProfile(result.user.uid);
        if (profile.role !== 'admin') {
          setMsg(authMsg, 'Solo admin puede usar importador.');
          return;
        }
        setMsg(authMsg, `Sesión iniciada como ${profile.displayName}.`, true);
      } catch (error) {
        setMsg(authMsg, error.message || 'Error de autenticación.');
      }
    });

    document.getElementById('import-btn').addEventListener('click', async () => {
      if (!auth.currentUser || !profile || profile.role !== 'admin') {
        setMsg(importMsg, 'Debés iniciar sesión admin.');
        return;
      }

      let parsed;
      try {
        parsed = JSON.parse(document.getElementById('json-input').value);
      } catch {
        setMsg(importMsg, 'JSON inválido.');
        return;
      }

      if (!Array.isArray(parsed)) {
        setMsg(importMsg, 'El JSON debe ser un arreglo de objetos.');
        return;
      }

      let count = 0;
      for (const item of parsed) {
        const payload = {
          patientName: String(item.patientName || '').trim(),
          dni: String(item.dni || '').trim(),
          eye: String(item.eye || 'OD'),
          lens: String(item.lens || '').trim(),
          prequirurgico: String(item.prequirurgico || ''),
          status: String(item.status || 'pendiente'),
          fechaCirugia: String(item.fechaCirugia || ''),
          autorizacion: String(item.autorizacion || 'pendiente'),
          administrativo: String(item.administrativo || ''),
          notas: String(item.notas || ''),
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        };

        if (!payload.patientName || !payload.dni || !payload.lens) continue;
        await addDoc(collection(db, appConfig.businessCollection), payload);
        count += 1;
      }

      setMsg(importMsg, `Importación completada. Registros guardados: ${count}.`, true);
    });
  </script>
</body>
</html>
